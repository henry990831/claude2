const SAVE_KEY = 'ms_save_v3';

function createDefaultSave() {
  return {
    coins: 0,
    language: 'zh', // 'zh' or 'en'
    ownedItems: { scan:0, autoflag:0, freeze:0, defuse:0, undo:0 },
    ownedSkins: ['classic'],
    activeSkin: 'classic',
    ownedBackgrounds: ['none'],
    activeBackground: 'none',
    ownedSounds: ['classic'],
    activeSound: 'classic',
    ownedEffects: ['none'],
    activeEffect: 'none',
    ownedBGM: ['calm'],
    activeBGM: 'calm',
    best: {
      easy:{ time:null, score:0 }, medium:{ time:null, score:0 },
      hard:{ time:null, score:0 }, custom:{ time:null, score:0 }, special:{ time:null, score:0 }
    },
    lastWinDate: { easy:null, medium:null, hard:null, custom:null, special:null },
    survival: { currentStreak:0, maxStreak:0, currentLevel:1 },
    daily: { lastCheckIn:null, consecutiveDays:0, totalCheckIns:0, history:[], timezone:'UTC', resetHour:0 },
    achievements: { unlocked:[], stats:{} },
    rank: { wins:0, losses:0, score:0, currentRank:'bronze' },
    statistics: {
      totalGames:0, totalWins:0, totalLosses:0, totalPlayTime:0, totalClicks:0, totalFlags:0, totalItemsUsed:0,
      byDifficulty: {}, totalCoinsEarned:0, totalCoinsSpent:0, maxSingleEarn:0,
      firstPlayDate:null, lastPlayDate:null, activeDays:0
    },
    eyeProtection: { enabled:false, intensity:'off', reminderInterval:0 },
    musicPlayer: { volume:0.7, bgmVolume:0.8, sfxVolume:0.6, playing:false, mode:'loop' },
    settings: { vibration:false, particles:true },
    devMode: false,
    devModeBackupCoins: null
  };
}

function loadState() {
  let raw = null;
  try { raw = localStorage.getItem(SAVE_KEY); } catch(e) {}
  let s = raw ? JSON.parse(raw) : null;
  if (!s) {
    s = createDefaultSave();
    saveState(s);
  } else {
    // 向后兼容：补充新字段
    const defaults = createDefaultSave();
    s = { ...defaults, ...s };
    if (!s.rank) s.rank = defaults.rank;
    if (!s.statistics) s.statistics = defaults.statistics;
    if (!s.eyeProtection) s.eyeProtection = defaults.eyeProtection;
    if (!s.musicPlayer) s.musicPlayer = defaults.musicPlayer;
    if (!s.ownedBGM) s.ownedBGM = ['calm'];
    if (!s.activeBGM) s.activeBGM = 'calm';
  }
  return s;
}

function saveState(s) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); } catch(e) {}
}

let SAVE = loadState();

function vibrate(pattern) {
  if (SAVE.settings && SAVE.settings.vibration && navigator.vibrate) {
    navigator.vibrate(pattern);
  }
}

const Vibration = {
  light: () => vibrate(10),
  medium: () => vibrate(20),
  heavy: () => vibrate(50),
  success: () => vibrate([10, 50, 10]),
  error: () => vibrate([50, 100, 50]),
  pattern: (arr) => vibrate(arr)
};

/* =========================================================
   音效系统（支持不同音效包）
========================================================= */
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, dur, type, gain, pack) {
  try {
    const ctx = ac();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    
    // 根据音效包调整参数
    if (pack === 'retro') {
      type = 'square';
      freq *= 0.8;
      gain *= 1.2;
    } else if (pack === 'nature') {
      type = 'sine';
      gain *= 0.6;
      dur *= 1.5;
    } else if (pack === 'scifi') {
      type = 'sawtooth';
      freq *= 1.3;
    }
    
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    g.gain.value = (gain || 0.08) * (SAVE.musicPlayer.sfxVolume || 0.6);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

/* =========================================================

========================================================= */
function $(sel) { return document.querySelector(sel); }
function $all(sel) { return document.querySelectorAll(sel); }

function todayStr() {
  const d = getUserDate();
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}

function getUserDate() {
  const now = new Date();
  const resetHour = SAVE.daily.resetHour || 0;
  const adjusted = new Date(now.getTime());
  if (now.getHours() < resetHour) {
    adjusted.setDate(adjusted.getDate() - 1);
  }
  return adjusted;
}

function fmtTime(sec) {
  sec = Math.round(sec);
  const m = Math.floor(sec / 60), s = sec % 60;
  return (m > 0 ? m + '分' : '') + s + '秒';
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._tm);
  toast._tm = setTimeout(() => t.classList.add('hidden'), 2000);
}

function updatePlayerCard() {
  // 更新段位信息
  const score = calculateRankScore();
  let currentRank = 'bronze';
  for (const [key, rank] of Object.entries(RANKS)) {
    if (score >= rank.minScore) currentRank = key;
  }
  
  const rankData = RANKS[currentRank];
  const rankIcon = $('#player-rank-icon');
  const rankName = $('#player-rank-name');
  const rankScore = $('#player-rank-score');
  
  if (rankIcon) {
    rankIcon.className = `rank-icon rank-${currentRank}`;
    rankIcon.textContent = rankData.icon;
  }
  
  if (rankName) rankName.textContent = rankData.name;
  if (rankScore) rankScore.textContent = Math.round(score) + '分';
  
  // 更新胜率
  const winrate = SAVE.statistics.totalGames > 0 
    ? Math.round((SAVE.statistics.totalWins / SAVE.statistics.totalGames) * 100) 
    : 0;
  const winrateEl = $('#player-winrate');
  if (winrateEl) winrateEl.textContent = winrate + '%';
}

function createMatrixRain(container) {
  const canvas = document.createElement('canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;';
  container.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  const chars = '01アイウエオカキクケコサシスセソタチツテト';
  const fontSize = 16;
  const columns = Math.floor(canvas.width / fontSize);
  const drops = Array(columns).fill(1);
  
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0F8';
    ctx.font = fontSize + 'px monospace';
    
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 50);
}

/* =========================================================
   段位系统
========================================================= */
function calculateRankScore() {
  return (SAVE.rank.wins * 5) + (SAVE.rank.wins / (SAVE.rank.wins + SAVE.rank.losses || 1) * 1000);
}

function updateRank() {
  const score = calculateRankScore();
  SAVE.rank.score = Math.round(score);
  
  let newRank = 'bronze';
  for (const [key, rank] of Object.entries(RANKS)) {
    if (score >= rank.minScore) newRank = key;
  }
  
  if (newRank !== SAVE.rank.currentRank) {
    const oldRank = RANKS[SAVE.rank.currentRank];
    const newRankData = RANKS[newRank];
    SAVE.rank.currentRank = newRank;
    
    // 解锁段位皮肤
    if (newRankData.skin && !SAVE.ownedSkins.includes(newRankData.skin)) {
      SAVE.ownedSkins.push(newRankData.skin);
      toast(`🎉 恭喜晋级 ${newRankData.icon} ${newRankData.name}！解锁专属皮肤！`);
      Sound.achievement();
    } else {
      toast(`🎉 段位提升：${newRankData.icon} ${newRankData.name}`);
    }
  }
  
  saveState(SAVE);
}

function applyEyeProtection() {
  const mode = SAVE.eyeProtection.mode;
  const intensity = SAVE.eyeProtection.intensity;
  let enabled = SAVE.eyeProtection.enabled;
  
  if (mode === 'auto') {
    const hour = new Date().getHours();
    enabled = (hour >= 18 || hour < 6);
  }
  
  const filters = {
    light: 'sepia(5%) saturate(95%)',
    medium: 'sepia(10%) saturate(90%) contrast(95%)',
    heavy: 'sepia(15%) saturate(85%) contrast(90%) brightness(90%)'
  };
  
  document.body.style.filter = enabled ? filters[intensity] : 'none';
  
  // 游戏时长提醒
  if (enabled && SAVE.eyeProtection.reminderInterval > 0) {
    clearInterval(eyeProtectionTimer);
    eyeProtectionTimer = setInterval(() => {
      showEyeProtectionReminder();
    }, SAVE.eyeProtection.reminderInterval * 60 * 1000);
  }
}

function showEyeProtectionReminder() {
  const playTime = playTimeStart ? Math.floor((Date.now() - playTimeStart) / 60000) : 0;
  if (playTime >= SAVE.eyeProtection.reminderInterval) {
    const modal = confirm(`👀 休息提醒\n\n已连续游戏 ${playTime} 分钟\n\n建议：\n• 远眺窗外 20 秒\n• 闭眼休息 1 分钟\n• 喝一口水\n\n点击"确定"继续游戏，"取消"休息5分钟`);
    if (modal) {
      playTimeStart = Date.now();
    } else {
      playTimeStart = Date.now() + 5 * 60 * 1000;
    }
  }
}

/* =========================================================
   游戏核心逻辑
========================================================= */
let G = null;

function densityInfo(rows, cols, mines) {
  const density = mines / (rows * cols);
  let label = '过于简单';
  if (density >= 0.25) label = '地狱';
  else if (density >= 0.20) label = '困难';
  else if (density >= 0.15) label = '中等';
  else if (density >= 0.10) label = '简单';
  return { pct: Math.round(density * 100), label };
}

function customBaseAndPar(rows, cols, mines) {
  const base = Math.max(3, Math.round(rows * cols * 0.03 + mines * 0.35));
  const par = Math.max(20, Math.round(rows * cols * 0.7 + mines * 1.2));
  return { base, par };
}


function buildEmptyBoard(rows, cols) {
  const board = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({ mine: false, revealed: false, flagged: false, adj: 0, specialType: null });
    }
    board.push(row);
  }
  return board;
}

function neighborsOf(r, c, rows, cols) {
  const list = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) list.push([nr, nc]);
    }
  }
  return list;
}

function placeMines(board, rows, cols, mines, safeR, safeC, isSpecialMode) {
  const safeSet = new Set();
  safeSet.add(safeR + '_' + safeC);
  neighborsOf(safeR, safeC, rows, cols).forEach(([r, c]) => safeSet.add(r + '_' + c));

  const candidates = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!safeSet.has(r + '_' + c)) candidates.push([r, c]);
    }
  }

  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }

  const m = Math.min(mines, candidates.length);
  for (let i = 0; i < m; i++) {
    const [r, c] = candidates[i];
    board[r][c].mine = true;
    
    // 特殊地雷模式
    if (isSpecialMode) {
      const rand = Math.random();
      if (rand < 0.05) board[r][c].specialType = 'treasure';
      else if (rand < 0.15) board[r][c].specialType = 'chain';
      else if (rand < 0.20) board[r][c].specialType = 'freeze';
      else if (rand < 0.25) board[r][c].specialType = 'mystery';
    }
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      let n = 0;
      neighborsOf(r, c, rows, cols).forEach(([nr, nc]) => {
        if (board[nr][nc].mine) n++;
      });
      board[r][c].adj = n;
    }
  }
  return m;
}

function startGame(diffKey, customCfg, isZen = false, isSurvival = false, isSpecial = false) {
  let rows, cols, mines, base, par;

  if (isSurvival) {
    const level = SAVE.survival.currentLevel;
    rows = Math.min(9 + Math.floor(level / 3), 20);
    cols = Math.min(9 + Math.floor(level / 3), 20);
    mines = Math.min(10 + level * 2, Math.floor(rows * cols * 0.2));
    const cp = customBaseAndPar(rows, cols, mines);
    base = cp.base * (1 + level * 0.1);
    par = cp.par;
  } else if (diffKey === 'custom') {
    rows = customCfg.rows;
    cols = customCfg.cols;
    mines = customCfg.mines;
    const cp = customBaseAndPar(rows, cols, mines);
    base = cp.base;
    par = cp.par;
  } else {
    const d = DIFFS[diffKey];
    rows = d.rows;
    cols = d.cols;
    mines = d.mines;
    base = d.base;
    par = d.par;
  }

  if (isSpecial) base = Math.round(base * 1.3);

  G = {
    diffKey, rows, cols, mines, origMines: mines, base, par,
    board: buildEmptyBoard(rows, cols),
    started: false, over: false, firstClick: true,
    timer: 0, timerInt: null, frozen: false, flagMode: false,
    itemsUsed: 0, flagCount: 0, revealedSafe: 0, undoSnapshot: null,
    isZen, isSurvival, isSpecial, noFlagUsed: true,
    moveHistory: [], // 记录所有操作
    mistakes: []     // 记录失误
  };

  renderGame();
  showScreen('screen-game');
  playTimeStart = Date.now();
}

function renderGame() {
  const cellSize = G.cols <= 9 ? 34 : G.cols <= 16 ? 28 : G.cols <= 22 ? 24 : 20;
  const boardEl = $('#board');
  boardEl.style.gridTemplateColumns = `repeat(${G.cols}, ${cellSize}px)`;
  boardEl.innerHTML = '';
  G.cellEls = [];

  for (let r = 0; r < G.rows; r++) {
    const rowEls = [];
    for (let c = 0; c < G.cols; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.style.width = cellSize + 'px';
      div.style.height = cellSize + 'px';
      div.style.fontSize = Math.round(cellSize * 0.45) + 'px';
      div.dataset.r = r;
      div.dataset.c = c;
      div.addEventListener('click', onCellClick);
      div.addEventListener('contextmenu', onCellRightClick);
      boardEl.appendChild(div);
      rowEls.push(div);
    }
    G.cellEls.push(rowEls);
  }

  $('#mine-count').textContent = G.mines;
  $('#timer').textContent = '0';

  const timerDisplay = $('#timer-display');
  if (G.isZen) timerDisplay.classList.add('hidden');
  else timerDisplay.classList.remove('hidden');

  $('#btn-flag-mode').classList.remove('active-mode');
  renderItemsBar();
}


function startTimer() {
  if (G.isZen) return;
  G.timerInt = setInterval(() => {
    if (G.frozen) return;
    G.timer++;
    $('#timer').textContent = G.timer;
  }, 1000);
}

function stopTimer() {
  clearInterval(G.timerInt);
}

let pendingClick = null;
const DBLCLICK_WINDOW = 240;

function onCellClick(e) {
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!G || G.over) return;

  if (G.flagMode) {
    if (pendingClick) { clearTimeout(pendingClick.timerId); pendingClick = null; }
    const cell = G.board[r][c];
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }

  if (pendingClick && pendingClick.r === r && pendingClick.c === c) {
    clearTimeout(pendingClick.timerId);
    pendingClick = null;
    const cell = G.board[r][c];
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }
  if (pendingClick) { clearTimeout(pendingClick.timerId); pendingClick = null; }

  const timerId = setTimeout(() => {
    pendingClick = null;
    handlePrimaryAction(r, c);
  }, DBLCLICK_WINDOW);
  pendingClick = { r, c, timerId };
}

function onCellRightClick(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!G || G.over) return;
  if (pendingClick && pendingClick.r === r && pendingClick.c === c) {
    clearTimeout(pendingClick.timerId);
    pendingClick = null;
  }
  const cell = G.board[r][c];
  if (!cell.revealed) toggleFlag(r, c);
}

function handlePrimaryAction(r, c) {
  if (!G || G.over) return;
  const cell = G.board[r][c];

  if (G.flagMode) {
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }

  if (cell.flagged) return;

  if (cell.revealed) {
    if (cell.adj > 0) {
      const nbrs = neighborsOf(r, c, G.rows, G.cols);
      const flagged = nbrs.filter(([nr, nc]) => G.board[nr][nc].flagged).length;
      if (flagged === cell.adj) {
        // 记录和弦操作
        G.moveHistory.push({
          type: 'chord',
          r, c,
          time: G.timer,
          timestamp: Date.now()
        });
        
        // 统计点击
        SAVE.statistics.totalClicks++;
        
        nbrs.forEach(([nr, nc]) => {
          if (!G.board[nr][nc].flagged && !G.board[nr][nc].revealed) revealCell(nr, nc);
        });
        checkWin();
      }
    }
    return;
  }

  if (G.firstClick) {
    snapshotBoard();
    const placed = placeMines(G.board, G.rows, G.cols, G.mines, r, c, G.isSpecial);
    G.mines = placed;
    $('#mine-count').textContent = Math.max(0, G.mines - G.flagCount);
    G.firstClick = false;
    G.started = true;
    startTimer();
  } else {
    snapshotBoard();
  }

  // 记录点击操作
  G.moveHistory.push({
    type: 'reveal',
    r, c,
    time: G.timer,
    timestamp: Date.now()
  });
  
  // 统计点击
  SAVE.statistics.totalClicks++;

  revealCell(r, c);
  if (!G.over) checkWin();
}

function snapshotBoard() {
  G.undoSnapshot = {
    cells: G.board.map(row => row.map(cell => ({ revealed: cell.revealed, flagged: cell.flagged }))),
    timer: G.timer
  };
}

function revealCell(r, c) {
  const cell = G.board[r][c];
  if (cell.revealed || cell.flagged) return;

  const stack = [[r, c]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const cur = G.board[cr][cc];
    if (cur.revealed || cur.flagged) continue;
    cur.revealed = true;
    G.revealedSafe += cur.mine ? 0 : 1;
    renderCell(cr, cc);

    if (cur.mine) {
      if (G.isSpecial && cur.specialType) {
        handleSpecialMine(cr, cc, cur.specialType);
      } else {
        triggerLose(cr, cc);
      }
      return;
    }
    Sound.open();
    if (cur.adj === 0) {
      neighborsOf(cr, cc, G.rows, G.cols).forEach(([nr, nc]) => {
        if (!G.board[nr][nc].revealed && !G.board[nr][nc].flagged) stack.push([nr, nc]);
      });
    }
  }
}

function handleSpecialMine(r, c, type) {
  if (type === 'treasure') {
    const coins = Math.floor(Math.random() * 11) + 5;
    SAVE.coins += coins;
    saveState(SAVE);
    refreshCoinDisplays();
    toast(`💰 发现宝藏！获得 ${coins} 金币`);
    Sound.coin();
    G.board[r][c].mine = false;
    checkWin();
  } else if (type === 'freeze') {
    toast('❄️ 冰冻雷！时间暂停 5 秒');
    G.frozen = true;
    setTimeout(() => { G.frozen = false; }, 5000);
    G.board[r][c].mine = false;
    checkWin();
  } else if (type === 'chain') {
    toast('🔥 连锁雷！引爆周围地雷');
    Vibration.error();
    const nbrs = neighborsOf(r, c, G.rows, G.cols);
    nbrs.forEach(([nr, nc]) => {
      if (G.board[nr][nc].mine) {
        G.board[nr][nc].revealed = true;
        renderCell(nr, nc);
      }
    });
    triggerLose(r, c);
  } else if (type === 'mystery') {
    const rand = Math.random();
    if (rand < 0.30) {
      const coins = 20;
      SAVE.coins += coins;
      saveState(SAVE);
      refreshCoinDisplays();
      toast(`🎲 随机雷：获得 ${coins} 金币！`);
      Sound.coin();
      G.board[r][c].mine = false;
      checkWin();
    } else if (rand < 0.55) {
      toast('🎲 随机雷：揭示 3×3 区域');
      const nbrs = neighborsOf(r, c, G.rows, G.cols).concat([[r, c]]);
      nbrs.forEach(([nr, nc]) => {
        if (!G.board[nr][nc].mine && !G.board[nr][nc].revealed) {
          G.board[nr][nc].revealed = true;
          G.revealedSafe++;
          renderCell(nr, nc);
        }
      });
      G.board[r][c].mine = false;
      checkWin();
    } else if (rand < 0.75) {
      toast('🎲 随机雷：自动标记 3 个地雷');
      let marked = 0;
      for (let rr = 0; rr < G.rows && marked < 3; rr++) {
        for (let cc = 0; cc < G.cols && marked < 3; cc++) {
          if (G.board[rr][cc].mine && !G.board[rr][cc].revealed && !G.board[rr][cc].flagged) {
            toggleFlag(rr, cc);
            marked++;
          }
        }
      }
      G.board[r][c].mine = false;
      checkWin();
    } else if (rand < 0.90) {
      if (G.timer >= 10) {
        G.timer -= 10;
        $('#timer').textContent = G.timer;
        toast('🎲 随机雷：时间 -10 秒');
      }
      G.board[r][c].mine = false;
      checkWin();
    } else {
      toast('🎲 随机雷：爆炸！');
      triggerLose(r, c);
    }
  }
}


function toggleFlag(r, c) {
  const cell = G.board[r][c];
  const wasFlagged = cell.flagged;
  cell.flagged = !cell.flagged;
  G.flagCount += cell.flagged ? 1 : -1;
  $('#mine-count').textContent = G.mines - G.flagCount;
  renderCell(r, c);
  Sound.flag();
  if (cell.flagged) {
    G.noFlagUsed = false;
    // 统计标旗
    SAVE.statistics.totalFlags++;
  }
  
  // 记录标旗操作
  G.moveHistory.push({
    type: cell.flagged ? 'flag' : 'unflag',
    r, c,
    time: G.timer,
    timestamp: Date.now(),
    isMine: cell.mine // 记录是否是真雷
  });
  
  // 检测错误标旗
  if (cell.flagged && !cell.mine) {
    G.mistakes.push({
      type: 'wrong_flag',
      r, c,
      time: G.timer,
      description: t('wrongFlagDesc')
    });
  }
}

function renderCell(r, c) {
  const cell = G.board[r][c];
  const el = G.cellEls[r][c];
  el.classList.remove('pop');
  el.className = 'cell';
  if (cell.revealed) {
    el.classList.add('revealed');
    if (cell.mine) {
      el.classList.add('mine-cell');
      if (cell.specialType) {
        el.textContent = SPECIAL_MINE_TYPES[cell.specialType].icon;
      }
    } else if (cell.adj > 0) {
      el.textContent = cell.adj;
      el.dataset.n = cell.adj;
      
      // 特殊地雷周围数字颜色
      if (G.isSpecial) {
        const nbrs = neighborsOf(r, c, G.rows, G.cols);
        for (const [nr, nc] of nbrs) {
          if (G.board[nr][nc].mine && G.board[nr][nc].specialType) {
            const type = G.board[nr][nc].specialType;
            el.style.color = SPECIAL_MINE_TYPES[type].color;
            break;
          }
        }
      }
    }
    void el.offsetWidth;
    el.classList.add('pop');
  } else if (cell.flagged) {
    el.classList.add('flagged');
  }
}

function triggerLose(r, c) {
  G.over = true;
  stopTimer();
  
  // 记录游戏时长
  SAVE.statistics.totalPlayTime += G.timer;
  SAVE.statistics.lastPlayDate = todayStr();
  if (!SAVE.statistics.firstPlayDate) {
    SAVE.statistics.firstPlayDate = todayStr();
  }
  
  G.cellEls[r][c].classList.add('exploded');
  
  // 记录致命失误 - 标记为最后一步
  G.mistakes.push({
    type: 'fatal',
    r, c,
    time: G.timer,
    description: t('fatalDesc'),
    isLastMove: true  // 标记为最后一步
  });
  
  // 分析失误：找出本可以避免的错误
  analyzeMistakes();

  for (let rr = 0; rr < G.rows; rr++) {
    for (let cc = 0; cc < G.cols; cc++) {
      const cell = G.board[rr][cc];
      if (cell.mine && !cell.revealed) {
        cell.revealed = true;
        renderCell(rr, cc);
      }
    }
  }

  Sound.lose();
  
  if (G.isSurvival) {
    SAVE.survival.currentStreak = 0;
    SAVE.survival.currentLevel = 1;
  }
  
  SAVE.rank.losses++;
  SAVE.statistics.totalLosses++;
  SAVE.statistics.totalGames++;
  updateRank();
  saveState(SAVE);

  setTimeout(() => showResult(false), 600);
}

// 分析失误
function analyzeMistakes() {
  const fatalCell = G.mistakes.find(m => m.type === 'fatal');
  if (!fatalCell) return;
  
  const fr = fatalCell.r, fc = fatalCell.c;
  
  // 检查周围已揭示的数字格子
  const nbrs = neighborsOf(fr, fc, G.rows, G.cols);
  for (const [nr, nc] of nbrs) {
    const cell = G.board[nr][nc];
    if (cell.revealed && cell.adj > 0) {
      // 检查这个数字周围的情况
      const cellNbrs = neighborsOf(nr, nc, G.rows, G.cols);
      const hiddenCount = cellNbrs.filter(([r,c]) => !G.board[r][c].revealed && !G.board[r][c].flagged).length;
      const flaggedCount = cellNbrs.filter(([r,c]) => G.board[r][c].flagged).length;
      const mineCount = cellNbrs.filter(([r,c]) => G.board[r][c].mine).length;
      
      // 如果隐藏格子数等于剩余雷数，说明这些都是雷，应该先标记
      if (cell.adj - flaggedCount === hiddenCount && hiddenCount > 0) {
        G.mistakes.push({
          type: 'should_flag',
          r: nr,
          c: nc,
          time: fatalCell.time - 1,
          description: `数字 ${cell.adj} 周围的隐藏格子都应该先标旗`,
          relatedCells: cellNbrs.filter(([r,c]) => !G.board[r][c].revealed)
        });
        break;
      }
    }
  }
  
  // 检查是否有明显可以推理的安全格子没有点击
  for (let r = 0; r < G.rows; r++) {
    for (let c = 0; c < G.cols; c++) {
      const cell = G.board[r][c];
      if (cell.revealed && cell.adj > 0) {
        const cellNbrs = neighborsOf(r, c, G.rows, G.cols);
        const flaggedCount = cellNbrs.filter(([nr,nc]) => G.board[nr][nc].flagged).length;
        
        // 如果旗子数已经等于数字，周围其他格子都是安全的
        if (flaggedCount === cell.adj) {
          const safeUnrevealed = cellNbrs.filter(([nr,nc]) => 
            !G.board[nr][nc].revealed && !G.board[nr][nc].flagged
          );
          if (safeUnrevealed.length > 0) {
            G.mistakes.push({
              type: 'missed_safe',
              r, c,
              time: fatalCell.time - 2,
              description: `数字 ${cell.adj} 周围已标够旗，其他格子是安全的`,
              relatedCells: safeUnrevealed
            });
          }
        }
      }
    }
  }
}

function checkWin() {
  const total = G.rows * G.cols - G.mines;
  if (G.revealedSafe >= total) {
    G.over = true;
    stopTimer();
    
    // 记录游戏时长
    SAVE.statistics.totalPlayTime += G.timer;
    SAVE.statistics.lastPlayDate = todayStr();
    if (!SAVE.statistics.firstPlayDate) {
      SAVE.statistics.firstPlayDate = todayStr();
    }
    
    Sound.win();
    
    if (G.isSurvival) {
      SAVE.survival.currentStreak++;
      SAVE.survival.currentLevel++;
      if (SAVE.survival.currentStreak > SAVE.survival.maxStreak) {
        SAVE.survival.maxStreak = SAVE.survival.currentStreak;
      }
    }
    
    SAVE.rank.wins++;
    SAVE.statistics.totalWins++;
    SAVE.statistics.totalGames++;
    updateRank();
    
    setTimeout(() => showResult(true), 400);
  }
}

function renderItemsBar() {
  const bar = $('#items-bar');
  if (!bar) return;
  bar.innerHTML = '';
  Object.keys(ITEMS).forEach(key => {
    if (key === 'undo') return;
    const owned = SAVE.ownedItems[key] || 0;
    const chip = document.createElement('div');
    chip.className = 'item-chip' + (owned <= 0 ? ' disabled' : '');
    chip.innerHTML = `<span>${ITEMS[key].icon} ${ITEMS[key].name}</span><span class="count">${owned}</span>`;
    chip.onclick = () => useItem(key);
    bar.appendChild(chip);
  });
}

function useItem(key) {
  if (!G || G.over) return;
  if ((SAVE.ownedItems[key] || 0) <= 0) { toast('道具不足'); return; }

  if (key === 'scan') {
    const hiddenSafe = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && !cell.flagged && !cell.mine) hiddenSafe.push([r, c]);
      }
    }
    if (!hiddenSafe.length) { toast('没有可揭示的安全格'); return; }
    const [r, c] = hiddenSafe[Math.floor(Math.random() * hiddenSafe.length)];
    if (G.firstClick) {
      placeMines(G.board, G.rows, G.cols, G.mines, r, c, G.isSpecial);
      G.firstClick = false;
      G.started = true;
      startTimer();
    }
    revealCell(r, c);
    checkWin();
  } else if (key === 'autoflag') {
    const hiddenMines = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && !cell.flagged && cell.mine) hiddenMines.push([r, c]);
      }
    }
    if (!hiddenMines.length) { toast('没有可标记的地雷'); return; }
    const [r, c] = hiddenMines[Math.floor(Math.random() * hiddenMines.length)];
    toggleFlag(r, c);
  } else if (key === 'freeze') {
    if (G.frozen) return;
    G.frozen = true;
    toast('⏸️ 计时暂停 10 秒');
    setTimeout(() => { G.frozen = false; }, 10000);
  } else if (key === 'defuse') {
    const hiddenMines = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && cell.mine) hiddenMines.push([r, c]);
      }
    }
    if (!hiddenMines.length) { toast('没有地雷可拆除'); return; }
    const [r, c] = hiddenMines[Math.floor(Math.random() * hiddenMines.length)];
    G.board[r][c].mine = false;
    if (G.board[r][c].flagged) { G.board[r][c].flagged = false; G.flagCount--; }
    G.mines--;
    $('#mine-count').textContent = Math.max(0, G.mines - G.flagCount);
    toast('💥 已拆除一个地雷');
    checkWin();
  }

  SAVE.ownedItems[key]--;
  G.itemsUsed++;
  SAVE.statistics.totalItemsUsed++;
  saveState(SAVE);
  renderItemsBar();
}

function showResult(won) {
  const modal = $('#modal-result');
  const title = $('#result-title');
  const stats = $('#result-stats');
  const earnEl = $('#coin-earn');

  if (won) {
    title.textContent = G.isSurvival ? '🔥 生存 +1' : (G.isZen ? '🧘 禅心通达' : '🎉 通关！');
    const coins = computeCoins();
    SAVE.coins += coins;
    SAVE.statistics.totalCoinsEarned += coins;
    
    // 记录单局最高
    if (coins > SAVE.statistics.maxSingleEarn) {
      SAVE.statistics.maxSingleEarn = coins;
    }
    
    stats.innerHTML = `
      <div>${t('time')} <b>${fmtTime(G.timer)}</b></div>
      <div>${t('operations')} <b>${G.moveHistory.length}</b> ${t('times')}</div>
      <div>${t('coins')} <b>+${coins}</b></div>
    `;
    earnEl.textContent = `🪙 ${t('got')} ${coins} ${t('coins')}`;
    Sound.coin();
    
    triggerVictoryEffect();
  } else {
    title.textContent = '💥 ' + t('gameFailed');
    const mistakeCount = G.mistakes.length;
    stats.innerHTML = `
      <div>${t('time')} <b>${fmtTime(G.timer)}</b></div>
      <div>${t('operations')} <b>${G.moveHistory.length}</b> ${t('times')}</div>
      <div>${t('mistakes')} <b>${mistakeCount}</b> ${t('places')}</div>
    `;
    
    // 添加"查看复盘"按钮
    if (mistakeCount > 0) {
      earnEl.innerHTML = `
        <button class="secondary-btn" id="btn-review" style="margin-top:10px;background:var(--accent);color:#fff;border:none;">
          🔍 ${t('viewReview')} (${mistakeCount})
        </button>
      `;
      
      // 延迟绑定事件，等待按钮渲染
      setTimeout(() => {
        const reviewBtn = $('#btn-review');
        if (reviewBtn) {
          reviewBtn.onclick = () => {
            modal.classList.add('hidden');
            showReviewScreen();
          };
        }
      }, 100);
    } else {
      earnEl.textContent = t('noMistakes');
    }
  }

  saveState(SAVE);
  refreshCoinDisplays();
  
  // 检查成就
  checkAchievements();
  
  modal.classList.remove('hidden');
}

function computeCoins() {
  if (G.isZen) return 5;
  
  const ratio = G.timer / G.par;
  let speedMult = ratio <= 0.5 ? 3.0 : ratio <= 1 ? 2.0 : ratio <= 1.5 ? 1.5 : ratio <= 2 ? 1.0 : 0.5;
  const itemMult = Math.max(0.3, 1 - 0.15 * G.itemsUsed);
  const fairBonus = G.itemsUsed === 0 ? 1.5 : 1.0;
  let coins = Math.round(G.base * speedMult * itemMult * fairBonus);
  
  if (G.isSurvival) {
    const streakBonus = 1 + (SAVE.survival.currentStreak * 0.1);
    coins = Math.round(coins * streakBonus);
  }
  
  if (G.isSpecial) coins = Math.round(coins * 1.3);
  
  return coins;
}

// 设置功能
function setupSettings() {
  // 护眼模式按钮 - 设置初始状态
  $all('.eye-mode-btn').forEach(btn => {
    const currentMode = SAVE.eyeProtection?.intensity || 'off';
    if (btn.dataset.mode === currentMode) {
      btn.classList.add('active');
    }
    
    btn.addEventListener('click', () => {
      $all('.eye-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      SAVE.eyeProtection.intensity = btn.dataset.mode;
      applyEyeProtection();
      saveState(SAVE);
      $('#current-eye-mode').textContent = btn.textContent;
      toast(`护眼模式：${btn.textContent}`);
    });
  });
  
  // 时长提醒按钮 - 设置初始状态
  $all('.remind-btn').forEach(btn => {
    const currentInterval = SAVE.eyeProtection?.reminderInterval || 0;
    const btnTime = btn.dataset.time === 'off' ? 0 : parseInt(btn.dataset.time);
    if (btnTime === currentInterval) {
      btn.classList.add('active');
    }
    
    btn.addEventListener('click', () => {
      $all('.remind-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const time = btn.dataset.time;
      SAVE.eyeProtection.reminderInterval = time === 'off' ? 0 : parseInt(time);
      saveState(SAVE);
      toast(time === 'off' ? '提醒已关闭' : `已设置 ${time} 分钟提醒`);
    });
  });
  
  // 震动反馈开关
  const vibToggle = $('#vibration-toggle');
  if (vibToggle) {
    vibToggle.checked = SAVE.settings.vibration;
    vibToggle.addEventListener('change', (e) => {
      SAVE.settings.vibration = e.target.checked;
      saveState(SAVE);
      if (e.target.checked) {
        toast('震动反馈已开启');
        Vibration.medium();
      } else {
        toast('震动反馈已关闭');
      }
    });
  }
  
  // 粒子特效开关
  const particlesToggle = $('#particles-toggle');
  if (particlesToggle) {
    particlesToggle.checked = SAVE.settings.particles;
    particlesToggle.addEventListener('change', (e) => {
      SAVE.settings.particles = e.target.checked;
      saveState(SAVE);
      if (e.target.checked) {
        toast('粒子特效已开启');
        applyBackground();
      } else {
        toast('粒子特效已关闭');
        const bg = $('#particles-bg');
        if (bg) bg.innerHTML = '';
      }
    });
  }
  
  // 导出数据
  $('#btn-export-data')?.addEventListener('click', () => {
    try {
      const dataStr = JSON.stringify(SAVE, null, 2);
      navigator.clipboard.writeText(dataStr);
      toast(t('dataExported'));
    } catch (e) {
      // 备用方法
      const textarea = document.createElement('textarea');
      textarea.value = JSON.stringify(SAVE);
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      toast(t('dataExported'));
    }
  });
  
  // 导入数据
  $('#btn-import-data')?.addEventListener('click', () => {
    const dataStr = prompt('请粘贴存档数据：');
    if (!dataStr) return;
    try {
      const data = JSON.parse(dataStr);
      SAVE = data;
      saveState(SAVE);
      location.reload();
    } catch (e) {
      toast('数据格式错误');
    }
  });
  
  // 清空数据
  $('#btn-reset-data')?.addEventListener('click', () => {
    if (!confirm(t('confirmReset'))) return;
    try {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    } catch (e) {
      toast('清空失败');
    }
  });
}

// 护眼模式应用
function applyEyeProtection() {
  const intensity = SAVE.eyeProtection.intensity;
  
  const filters = {
    off: 'none',
    light: 'sepia(10%) saturate(95%)',
    medium: 'sepia(15%) saturate(90%) contrast(95%)',
    strong: 'sepia(20%) saturate(85%) contrast(90%) brightness(90%)'
  };
  
  document.body.style.filter = filters[intensity] || 'none';
}

      padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px;
      cursor:${isOwned ? 'pointer' : 'default'};
      ${isActive ? 'border:2px solid var(--accent);background:rgba(91,155,213,0.1);' : ''}
      ${!isOwned ? 'opacity:0.5;' : ''}
    `;
    
    item.innerHTML = `
      <div style="font-size:24px;">${track.icon}</div>
      <div style="flex:1;">
        <div style="font-weight:700;display:flex;align-items:center;gap:8px;">
          ${track.name}
          ${isActive ? '<span style="font-size:11px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:8px;">播放中</span>' : ''}
        </div>
        <div style="font-size:11px;color:var(--text-dim);">${track.style} ${track.bpm > 0 ? '· ' + track.bpm + ' BPM' : ''}</div>
      </div>
      <div style="font-weight:800;color:var(--gold);">
        ${isOwned ? (isActive ? '♪' : '▶') : '🪙 ' + track.price}
      </div>
    `;
    
    if (isOwned && !isActive) {
      item.onclick = () => {
        SAVE.activeBGM = key;
        saveState(SAVE);
        renderMusicPlayer();
        toast(`正在播放：${track.name}`);
      };
    } else if (!isOwned) {
      item.onclick = () => {
        if (SAVE.coins >= track.price) {
          if (confirm(`购买《${track.name}》需要 ${track.price} 金币，确定购买？`)) {
            SAVE.coins -= track.price;
            SAVE.ownedBGM.push(key);
            SAVE.statistics.totalCoinsSpent += track.price;
            saveState(SAVE);
            refreshCoinDisplays();
            renderMusicPlayer();
            Sound.buy();
          }
        } else {
          toast('金币不足');
        }
      };
    }
    
    playlist.appendChild(item);
  });
  
  // 绑定音量滑块事件
  $('#bgm-volume').oninput = (e) => {
    SAVE.musicPlayer.bgmVolume = e.target.value / 100;
    $('#bgm-vol-display').textContent = e.target.value + '%';
    saveState(SAVE);
  };
  
  $('#sfx-volume').oninput = (e) => {
    SAVE.musicPlayer.sfxVolume = e.target.value / 100;
    $('#sfx-vol-display').textContent = e.target.value + '%';
    saveState(SAVE);
  };
  
  $('#master-volume').oninput = (e) => {
    SAVE.musicPlayer.volume = e.target.value / 100;
    $('#master-vol-display').textContent = e.target.value + '%';
    saveState(SAVE);
  };
  
  // 全部静音按钮
  $('#btn-mute-all').onclick = () => {
    const isMuted = SAVE.musicPlayer.volume === 0;
    if (isMuted) {
      SAVE.musicPlayer.volume = 1;
      SAVE.musicPlayer.bgmVolume = 0.8;
      SAVE.musicPlayer.sfxVolume = 0.6;
    } else {
      SAVE.musicPlayer.volume = 0;
      SAVE.musicPlayer.bgmVolume = 0;
      SAVE.musicPlayer.sfxVolume = 0;
    }
    saveState(SAVE);
    renderMusicPlayer();
    toast(isMuted ? '已取消静音' : '已全部静音');
  };
}

// 段位渲染
function renderRank() {
  toast('段位系统开发中');
}

// 成就渲染
function renderAchievements() {
  const unlockedIds = SAVE.achievements.unlocked || [];
  const achievementKeys = Object.keys(ACHIEVEMENTS);
  
  $('#unlocked-count').textContent = unlockedIds.length;
  $('#total-achievements').textContent = achievementKeys.length;
  
  const list = $('#achievements-list');
  list.innerHTML = '';
  
  achievementKeys.forEach(key => {
    const ach = ACHIEVEMENTS[key];
    const isUnlocked = unlockedIds.includes(key);
    const lang = SAVE.language || 'zh';
    
    const card = document.createElement('div');
    card.className = 'glass-card';
    card.style.cssText = `
      padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;
      ${isUnlocked ? '' : 'opacity:0.5;filter:grayscale(0.8);'}
    `;
    
    card.innerHTML = `
      <div style="font-size:32px;">${isUnlocked ? ach.icon : '🔒'}</div>
      <div style="flex:1;">
        <div style="font-weight:800;margin-bottom:2px;">${ach.name[lang]}</div>
        <div style="font-size:12px;color:var(--text-dim);">${ach.desc[lang]}</div>
        <div style="font-size:11px;margin-top:4px;color:var(--gold);">🪙 ${ach.reward} 金币</div>
      </div>
      ${isUnlocked ? '<div style="color:var(--success);font-size:20px;">✓</div>' : ''}
    `;
    
    list.appendChild(card);
  });
}

// 检查并解锁成就
function checkAchievements() {
  let newUnlocked = [];
  const unlockedIds = SAVE.achievements.unlocked || [];
  
  Object.keys(ACHIEVEMENTS).forEach(key => {
    if (!unlockedIds.includes(key)) {
      const ach = ACHIEVEMENTS[key];
      if (ach.check(SAVE)) {
        unlockedIds.push(key);
        newUnlocked.push(key);
        
        // 奖励金币
        SAVE.coins += ach.reward;
        
        // 显示通知
        const lang = SAVE.language || 'zh';
        toast(`🎉 成就解锁: ${ach.name[lang]} (+${ach.reward} 🪙)`);
        Sound.achievement();
      }
    }
  });
  
  SAVE.achievements.unlocked = unlockedIds;
  if (newUnlocked.length > 0) {
    saveState(SAVE);
    refreshCoinDisplays();
  }
}

// 每日签到渲染
function renderDailyCheckin() {
  const today = todayStr();
  const lastCheckin = SAVE.daily.lastCheckIn;
  const canCheckin = lastCheckin !== today;
  
  $('#consecutive-days').textContent = SAVE.daily.consecutiveDays;
  $('#total-checkin-days').textContent = SAVE.daily.totalCheckIns;
  
  const btn = $('#btn-do-checkin');
  const status = $('#checkin-status');
  
  if (canCheckin) {
    btn.disabled = false;
    btn.textContent = '立即签到';
    btn.onclick = () => {
      SAVE.daily.lastCheckIn = today;
      SAVE.daily.consecutiveDays++;
      SAVE.daily.totalCheckIns++;
      
      let reward = 10;
      if (SAVE.daily.consecutiveDays >= 7) reward = 30;
      else if (SAVE.daily.consecutiveDays >= 3) reward = 20;
      
      SAVE.coins += reward;
      saveState(SAVE);
      refreshCoinDisplays();
      toast(`✅ 签到成功！获得 ${reward} 金币`);
      Sound.coin();
      renderDailyCheckin();
    };
    status.textContent = '';
  } else {
    btn.disabled = true;
    btn.textContent = '今日已签到';
    status.textContent = '✅ 明天再来吧';
  }
}

// 显示复盘分析界面
function showReviewScreen() {
  if (!G || !G.mistakes || G.mistakes.length === 0) {
    toast('没有失误记录');
    return;
  }
  
  // 创建复盘弹窗
  let reviewModal = $('#review-modal');
  if (!reviewModal) {
    reviewModal = document.createElement('div');
    reviewModal.id = 'review-modal';
    reviewModal.className = 'modal';
    document.body.appendChild(reviewModal);
  }
  
  const mistakes = G.mistakes;
  const fatalMistake = mistakes.find(m => m.type === 'fatal');
  const wrongFlags = mistakes.filter(m => m.type === 'wrong_flag');
  const shouldFlags = mistakes.filter(m => m.type === 'should_flag');
  const missedSafe = mistakes.filter(m => m.type === 'missed_safe');
  
  let mistakesList = '';
  
  // 致命失误
  if (fatalMistake) {
    mistakesList += `
      <div class="mistake-item fatal" style="background:rgba(255,107,107,0.1);border-left:4px solid var(--danger);padding:12px;margin-bottom:12px;border-radius:8px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:24px;">💥</span>
          <div style="flex:1;">
            <div style="font-weight:800;color:var(--danger);display:flex;align-items:center;gap:8px;">
              ${t('fatalMistake')}
              ${fatalMistake.isLastMove ? `<span style="background:linear-gradient(135deg,#ff6b6b,#ff8787);color:#fff;padding:2px 8px;border-radius:12px;font-size:10px;animation:pulse 1.5s infinite;">⚡ ${t('lastMove')}</span>` : ''}
            </div>
            <div style="font-size:12px;color:var(--text-dim);">${fmtTime(fatalMistake.time)}</div>
          </div>
        </div>
        <div style="font-size:13px;color:var(--text-main);">${fatalMistake.description}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">${t('position')}：${t('row')}${fatalMistake.r + 1} ${t('col')}${fatalMistake.c + 1}</div>
        <button class="secondary-btn" onclick="highlightCell(${fatalMistake.r}, ${fatalMistake.c}, true)" style="margin-top:8px;padding:6px 12px;font-size:12px;">📍 ${t('highlight')}</button>
      </div>
    `;
  }
  
  // 应该标旗的地方
  if (shouldFlags.length > 0) {
    shouldFlags.forEach((mistake, idx) => {
      mistakesList += `
        <div class="mistake-item should-flag" style="background:rgba(255,193,7,0.1);border-left:4px solid var(--warning);padding:12px;margin-bottom:12px;border-radius:8px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="font-size:24px;">⚠️</span>
            <div>
              <div style="font-weight:800;color:var(--warning);">漏标地雷</div>
              <div style="font-size:12px;color:var(--text-dim);">第 ${fmtTime(mistake.time)}</div>
            </div>
          </div>
          <div style="font-size:13px;color:var(--text-main);">${mistake.description}</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">位置：行${mistake.r + 1} 列${mistake.c + 1}</div>
          <button class="secondary-btn" onclick="highlightMistakeArea(${mistake.r}, ${mistake.c}, 'should-flag')" style="margin-top:8px;padding:6px 12px;font-size:12px;">📍 高亮显示区域</button>
        </div>
      `;
    });
  }
  
  // 错误标旗
  if (wrongFlags.length > 0) {
    mistakesList += `
      <div class="mistake-item wrong-flag" style="background:rgba(255,152,0,0.1);border-left:4px solid #FF9800;padding:12px;margin-bottom:12px;border-radius:8px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:24px;">🚩</span>
          <div>
            <div style="font-weight:800;color:#FF9800;">错误标旗</div>
            <div style="font-size:12px;color:var(--text-dim);">共 ${wrongFlags.length} 处</div>
          </div>
        </div>
        <div style="font-size:13px;color:var(--text-main);">标记了非地雷位置，可能干扰判断</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:6px;">
          ${wrongFlags.map(m => `行${m.r+1} 列${m.c+1}`).join('、')}
        </div>
      </div>
    `;
  }
  
  // 漏掉的安全格子
  if (missedSafe.length > 0) {
    missedSafe.slice(0, 2).forEach(mistake => {
      mistakesList += `
        <div class="mistake-item missed-safe" style="background:rgba(76,175,80,0.1);border-left:4px solid var(--success);padding:12px;margin-bottom:12px;border-radius:8px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="font-size:24px;">💡</span>
            <div>
              <div style="font-weight:800;color:var(--success);">漏掉的安全格</div>
              <div style="font-size:12px;color:var(--text-dim);">第 ${fmtTime(mistake.time)}</div>
            </div>
          </div>
          <div style="font-size:13px;color:var(--text-main);">${mistake.description}</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">位置：行${mistake.r + 1} 列${mistake.c + 1}</div>
          <button class="secondary-btn" onclick="highlightMistakeArea(${mistake.r}, ${mistake.c}, 'missed-safe')" style="margin-top:8px;padding:6px 12px;font-size:12px;">📍 高亮显示区域</button>
        </div>

    });
  }
  
  if (!mistakesList) {
    mistakesList = '<div style="text-align:center;color:var(--text-dim);padding:20px;">没有发现明显失误</div>';
  }
  
  reviewModal.innerHTML = `
    <div class="modal-card glass-modal" style="max-width:500px;max-height:80vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div style="font-size:20px;font-weight:900;">🔍 失误分析</div>
        <button class="icon-btn" id="btn-close-review" style="width:36px;height:36px;">✕</button>
      </div>
      
      <div class="glass-card" style="padding:12px;margin-bottom:16px;text-align:center;">
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:6px;">本局统计</div>
        <div style="display:flex;justify-content:space-around;">
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--accent);">${G.moveHistory.length}</div>
            <div style="font-size:11px;color:var(--text-dim);">总操作</div>
          </div>
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--danger);">${mistakes.length}</div>
            <div style="font-size:11px;color:var(--text-dim);">失误数</div>
          </div>
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--warning);">${fmtTime(G.timer)}</div>
            <div style="font-size:11px;color:var(--text-dim);">用时</div>
          </div>
        </div>
      </div>
      
      <div style="font-weight:800;margin-bottom:12px;font-size:15px;">失误列表</div>
      <div id="mistakes-list">
        ${mistakesList}
      </div>
      
      <div class="modal-btns" style="margin-top:16px;">
        <button class="primary-btn" id="btn-back-to-game">返回游戏画面</button>
        <button class="secondary-btn" id="btn-close-review2">关闭复盘</button>
      </div>
    </div>
  `;
  
  reviewModal.classList.remove('hidden');
  
  // 绑定事件
  $('#btn-close-review').onclick = () => {
    reviewModal.classList.add('hidden');
    $('#modal-result').classList.remove('hidden');
  };
  
  $('#btn-close-review2').onclick = () => {
    reviewModal.classList.add('hidden');
    $('#modal-result').classList.remove('hidden');
  };
  
  $('#btn-back-to-game').onclick = () => {
    reviewModal.classList.add('hidden');
    // 游戏界面已经显示，只需关闭弹窗
  };
}

// 高亮单个格子
function highlightCell(r, c, isLastMove = false) {
  if (!G || !G.cellEls || !G.cellEls[r] || !G.cellEls[r][c]) return;
  
  const cell = G.cellEls[r][c];
  
  // 最后一步用特殊的紫红色高亮
  const color = isLastMove ? '#ff0066' : 'var(--danger)';
  const glowColor = isLastMove ? 'rgba(255,0,102,0.6)' : 'rgba(255,107,107,0.6)';
  
  cell.style.boxShadow = `0 0 0 4px ${color}, 0 0 30px ${glowColor}`;
  cell.style.transform = 'scale(1.3)';
  cell.style.zIndex = '100';
  cell.style.animation = 'pulse 1.5s infinite';
  
  // 添加脉冲动画样式
  if (!document.getElementById('pulse-style')) {
    const style = document.createElement('style');
    style.id = 'pulse-style';
    style.textContent = `
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
    `;
    document.head.appendChild(style);
  }
  
  // 滚动到该格子
  cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  setTimeout(() => {
    cell.style.boxShadow = '';
    cell.style.transform = '';
    cell.style.zIndex = '';
    cell.style.animation = '';
  }, 4000);
  
  const moveLabel = isLastMove ? ` (${t('lastMove')})` : '';
  toast(`${t('position')}：${t('row')}${r+1} ${t('col')}${c+1}${moveLabel}`);
}

// 高亮区域
function highlightMistakeArea(r, c, type) {
  if (!G || !G.cellEls) return;
  
  const mainCell = G.cellEls[r][c];
  const color = type === 'should-flag' ? 'var(--warning)' : 'var(--success)';
  
  // 高亮中心格子
  mainCell.style.boxShadow = `0 0 0 3px ${color}, 0 0 20px ${color}`;
  mainCell.style.transform = 'scale(1.15)';
  mainCell.style.zIndex = '100';
  mainCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  // 高亮周围格子
  const nbrs = neighborsOf(r, c, G.rows, G.cols);
  nbrs.forEach(([nr, nc]) => {
    const cell = G.cellEls[nr][nc];
    cell.style.boxShadow = `0 0 0 2px ${color}`;
    cell.style.opacity = '0.8';
  });
  
  setTimeout(() => {
    mainCell.style.boxShadow = '';
    mainCell.style.transform = '';
    mainCell.style.zIndex = '';
    nbrs.forEach(([nr, nc]) => {
      G.cellEls[nr][nc].style.boxShadow = '';
      G.cellEls[nr][nc].style.opacity = '';
    });
  }, 3000);
  
  toast(`查看行${r+1} 列${c+1} 周围区域`);
}
</script>
