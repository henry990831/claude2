const SAVE_KEY = 'ms_save_v2';

function loadState() {
  let raw = null;
  try { raw = localStorage.getItem(SAVE_KEY); } catch(e) {}
  let s = raw ? JSON.parse(raw) : null;
  if (!s) {
    s = createDefaultSave();
    saveState(s);
  } else {
    // 向后兼容：补充新字段
    s = { ...createDefaultSave(), ...s };
    if (!s.survival) s.survival = { currentStreak:0, maxStreak:0, currentLevel:1 };
    if (!s.daily) s.daily = createDefaultDaily();
    if (!s.achievements) s.achievements = { unlocked:[], stats:{} };
    if (!s.ownedBackgrounds) s.ownedBackgrounds = ['none'];
    if (!s.ownedSounds) s.ownedSounds = ['classic'];
    if (!s.ownedEffects) s.ownedEffects = ['none'];
    if (!s.activeBackground) s.activeBackground = 'none';
    if (!s.activeSound) s.activeSound = 'classic';
    if (!s.activeEffect) s.activeEffect = 'none';
  }
  return s;
}

/* =========================================================

let audioCtx = null;
function ac() { 
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
  return audioCtx; 
}

function beep(freq, dur, type, gain) {
  try {
    const ctx = ac();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    g.gain.value = gain || 0.08;
    osc.connect(g); g.connect(ctx.destination);
    osc.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function createMatrixRain(container) {
  const canvas = document.createElement('canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.cssText = 'width: 100%; height: 100%;';
  container.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  const chars = '01アイウエオカキクケコ';
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);
  
  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0F0';
    ctx.font = fontSize + 'px monospace';
    
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }
  
  setInterval(draw, 50);
}

/* =========================================================
   游戏核心逻辑
========================================================= */
let G = null;

function densityInfo(rows, cols, mines) {
  const density = mines / (rows * cols);
  let label = '过于简单';
  if (density >= 0.25) label = '地狱';
  else if (density >= 0.20) label = '困难';
  else if (density >= 0.15) label = '中等';
  else if (density >= 0.10) label = '简单';
  return { pct: Math.round(density * 100), label };
}

function customBaseAndPar(rows, cols, mines) {
  const base = Math.max(3, Math.round(rows * cols * 0.03 + mines * 0.35));
  const par = Math.max(20, Math.round(rows * cols * 0.7 + mines * 1.2));
  return { base, par };
}


function buildEmptyBoard(rows, cols) {
  const board = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({ mine: false, revealed: false, flagged: false, adj: 0 });
    }
    board.push(row);
  }
  return board;
}

function neighborsOf(r, c, rows, cols) {
  const list = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) list.push([nr, nc]);
    }
  }
  return list;
}

function placeMines(board, rows, cols, mines, safeR, safeC) {
  const safeSet = new Set();
  safeSet.add(safeR + '_' + safeC);
  neighborsOf(safeR, safeC, rows, cols).forEach(([r, c]) => safeSet.add(r + '_' + c));

  const candidates = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!safeSet.has(r + '_' + c)) candidates.push([r, c]);
    }
  }
  
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  
  const m = Math.min(mines, candidates.length);
  for (let i = 0; i < m; i++) {
    const [r, c] = candidates[i];
    board[r][c].mine = true;
  }
  
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      let n = 0;
      neighborsOf(r, c, rows, cols).forEach(([nr, nc]) => {
        if (board[nr][nc].mine) n++;
      });
      board[r][c].adj = n;
    }
  }
  return m;
}


/* =========================================================
   开始游戏
========================================================= */
function startGame(diffKey, customCfg, isZen = false, isSurvival = false) {
  let rows, cols, mines, base, par;
  
  if (isSurvival) {
    // 生存模式：根据关卡递增难度
    const level = SAVE.survival.currentLevel;
    rows = Math.min(9 + Math.floor(level / 3), 20);
    cols = Math.min(9 + Math.floor(level / 3), 20);
    mines = Math.min(10 + level * 2, Math.floor(rows * cols * 0.2));
    const cp = customBaseAndPar(rows, cols, mines);
    base = cp.base * (1 + level * 0.1);
    par = cp.par;
  } else if (diffKey === 'custom') {
    rows = customCfg.rows; cols = customCfg.cols; mines = customCfg.mines;
    const cp = customBaseAndPar(rows, cols, mines);
    base = cp.base; par = cp.par;
  } else {
    const d = DIFFS[diffKey];
    rows = d.rows; cols = d.cols; mines = d.mines; base = d.base; par = d.par;
  }

  G = {
    diffKey, rows, cols, mines, origMines: mines, base, par,
    board: buildEmptyBoard(rows, cols),
    started: false, over: false,
    firstClick: true,
    timer: 0, timerInt: null, frozen: false,
    flagMode: false,
    itemsUsed: 0,
    flagCount: 0,
    revealedSafe: 0,
    undoSnapshot: null,
    isZen: isZen,
    isSurvival: isSurvival,
    noFlagUsed: true
  };

  const cellSize = cols <= 9 ? 34 : cols <= 16 ? 28 : cols <= 22 ? 24 : 20;
  const boardEl = $('#board');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  boardEl.innerHTML = '';
  G.cellEls = [];
  
  for (let r = 0; r < rows; r++) {
    const rowEls = [];
    for (let c = 0; c < cols; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.style.width = cellSize + 'px';
      div.style.height = cellSize + 'px';
      div.style.fontSize = Math.round(cellSize * 0.45) + 'px';
      div.dataset.r = r; div.dataset.c = c;
      div.addEventListener('click', onCellClick);
      div.addEventListener('contextmenu', onCellRightClick);
      boardEl.appendChild(div);
      rowEls.push(div);
    }
    G.cellEls.push(rowEls);
  }

  $('#mine-count').textContent = mines;
  $('#timer').textContent = '0';
  
  // 禅模式隐藏计时器
  const timerDisplay = $('#timer-display');
  if (isZen) {
    timerDisplay.classList.add('hidden');
  } else {
    timerDisplay.classList.remove('hidden');
  }
  
  // 生存模式显示进度
  const survivalProgress = $('#survival-progress');
  if (isSurvival) {
    survivalProgress.classList.remove('hidden');
    $('#game-streak').textContent = SAVE.survival.currentStreak;
    const bonus = 1 + (SAVE.survival.currentStreak * 0.1);
    $('#game-bonus').textContent = '×' + bonus.toFixed(1);
  } else {
    survivalProgress.classList.add('hidden');
  }
  
  $('#btn-flag-mode').classList.remove('active-mode');
  renderItemsBar();
  showScreen('screen-game');
}

const DBLCLICK_WINDOW = 240;

function onCellClick(e) {
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!G || G.over) return;

  if (G.flagMode) {
    if (pendingClick) { clearTimeout(pendingClick.timerId); pendingClick = null; }
    const cell = G.board[r][c];
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }

  if (pendingClick && pendingClick.r === r && pendingClick.c === c) {
    clearTimeout(pendingClick.timerId);
    pendingClick = null;
    const cell = G.board[r][c];
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }
  if (pendingClick) { clearTimeout(pendingClick.timerId); pendingClick = null; }

  const timerId = setTimeout(() => {
    pendingClick = null;
    handlePrimaryAction(r, c);
  }, DBLCLICK_WINDOW);
  pendingClick = { r, c, timerId };
}

function onCellRightClick(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!G || G.over) return;
  if (pendingClick && pendingClick.r === r && pendingClick.c === c) {
    clearTimeout(pendingClick.timerId); pendingClick = null;
  }
  const cell = G.board[r][c];
  if (!cell.revealed) toggleFlag(r, c);
}

function handlePrimaryAction(r, c) {
  if (!G || G.over) return;
  const cell = G.board[r][c];

  if (G.flagMode) {
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }

  if (cell.flagged) return;

  if (cell.revealed) {
    if (cell.adj > 0) {
      const nbrs = neighborsOf(r, c, G.rows, G.cols);
      const flagged = nbrs.filter(([nr, nc]) => G.board[nr][nc].flagged).length;
      if (flagged === cell.adj) {
        nbrs.forEach(([nr, nc]) => {
          if (!G.board[nr][nc].flagged && !G.board[nr][nc].revealed) revealCell(nr, nc);
        });
        checkWin();
      }
    }
    return;
  }

  if (G.firstClick) {
    snapshotBoard();
    const placed = placeMines(G.board, G.rows, G.cols, G.mines, r, c);
    G.mines = placed;
    $('#mine-count').textContent = Math.max(0, G.mines - G.flagCount);
    G.firstClick = false;
    G.started = true;
    startTimer();
  } else {
    snapshotBoard();
  }

  revealCell(r, c);
  if (!G.over) checkWin();
}


function snapshotBoard() {
  G.undoSnapshot = {
    cells: G.board.map(row => row.map(cell => ({ revealed: cell.revealed, flagged: cell.flagged }))),
    timer: G.timer
  };
}

function revealCell(r, c) {
  const cell = G.board[r][c];
  if (cell.revealed || cell.flagged) return;

  const stack = [[r, c]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const cur = G.board[cr][cc];
    if (cur.revealed || cur.flagged) continue;
    cur.revealed = true;
    G.revealedSafe += cur.mine ? 0 : 1;
    renderCell(cr, cc);

    if (cur.mine) {
      triggerLose(cr, cc);
      return;
    }
    Sound.open();
    if (cur.adj === 0) {
      neighborsOf(cr, cc, G.rows, G.cols).forEach(([nr, nc]) => {
        if (!G.board[nr][nc].revealed && !G.board[nr][nc].flagged) stack.push([nr, nc]);
      });
    }
  }
}

function toggleFlag(r, c) {
  const cell = G.board[r][c];
  cell.flagged = !cell.flagged;
  G.flagCount += cell.flagged ? 1 : -1;
  $('#mine-count').textContent = G.mines - G.flagCount;
  renderCell(r, c);
  Sound.flag();
  if (cell.flagged) G.noFlagUsed = false;
}

function renderCell(r, c) {
  const cell = G.board[r][c];
  const el = G.cellEls[r][c];
  el.classList.remove('pop');
  el.className = 'cell';
  if (cell.revealed) {
    el.classList.add('revealed');
    if (cell.mine) {
      el.classList.add('mine-cell');
    } else if (cell.adj > 0) {
      el.textContent = cell.adj;
      el.dataset.n = cell.adj;
    }
    void el.offsetWidth;
    el.classList.add('pop');
  } else if (cell.flagged) {
    el.classList.add('flagged');
  }
}


/* =========================================================
   胜负判断
========================================================= */
function triggerLose(r, c) {
  G.over = true;
  stopTimer();
  G.cellEls[r][c].classList.add('exploded');
  
  for (let rr = 0; rr < G.rows; rr++) {
    for (let cc = 0; cc < G.cols; cc++) {
      const cell = G.board[rr][cc];
      if (cell.mine && !cell.revealed) {
        cell.revealed = true;
        renderCell(rr, cc);
      }
    }
  }
  
  Sound.lose();
  
  // 生存模式失败：重置连胜
  if (G.isSurvival) {
    SAVE.survival.currentStreak = 0;
    SAVE.survival.currentLevel = 1;
    saveState(SAVE);
  }
  
  setTimeout(() => showResult(false), 600);
}

function checkWin() {
  const total = G.rows * G.cols - G.mines;
  if (G.revealedSafe >= total) {
    G.over = true;
    stopTimer();
    Sound.win();
    
    // 生存模式：增加连胜和等级
    if (G.isSurvival) {
      SAVE.survival.currentStreak++;
      SAVE.survival.currentLevel++;
      if (SAVE.survival.currentStreak > SAVE.survival.maxStreak) {
        SAVE.survival.maxStreak = SAVE.survival.currentStreak;
      }
      updateAchievementStats({ maxStreak: SAVE.survival.maxStreak });
      saveState(SAVE);
    }
    
    setTimeout(() => showResult(true), 400);
  }
}


/* =========================================================
   结算与奖励
========================================================= */
function computeCoins() {
  if (G.isZen) {
    // 禅模式：固定少量奖励
    return { coins: 5, dailyBonus: 0, speedMult: 1, itemMult: 1, fairBonus: 1 };
  }
  
  const ratio = G.timer / G.par;
  let speedMult;
  if (ratio <= 0.5) speedMult = 3.0;
  else if (ratio <= 1) speedMult = 2.0;
  else if (ratio <= 1.5) speedMult = 1.5;
  else if (ratio <= 2) speedMult = 1.0;
  else speedMult = 0.5;

  const itemMult = Math.max(0.3, 1 - 0.15 * G.itemsUsed);
  const fairBonus = G.itemsUsed === 0 ? 1.5 : 1.0;

  let coins = Math.round(G.base * speedMult * itemMult * fairBonus);

  // 生存模式连胜加成
  if (G.isSurvival) {
    const streakBonus = 1 + (SAVE.survival.currentStreak * 0.1);
    coins = Math.round(coins * streakBonus);
  }

  // 每日首胜
  let dailyBonus = 0;
  const today = todayStr();
  if (!G.isSurvival && SAVE.lastWinDate[G.diffKey] !== today) {
    dailyBonus = 20;
    SAVE.lastWinDate[G.diffKey] = today;
  }
  
  return { coins: coins + dailyBonus, dailyBonus, speedMult, itemMult, fairBonus };
}

function computeScore() {
  if (G.isZen) return 0;
  
  const baseScore = G.rows * G.cols * 4;
  const mineScore = G.mines * 15;
  const timeScore = Math.max(0, (2 * G.par - G.timer)) * 3;
  const fairBonus = G.itemsUsed === 0 ? 500 : 0;
  const itemPenalty = G.itemsUsed * 150;
  return Math.max(0, Math.round(baseScore + mineScore + timeScore + fairBonus - itemPenalty));
}

function showResult(won) {
  const modal = $('#modal-result');
  const title = $('#result-title');
  const badge = $('#record-badge');
  const stats = $('#result-stats');
  const earnEl = $('#coin-earn');
  const achievementEl = $('#achievement-unlocked');

  badge.classList.add('hidden');
  achievementEl.classList.add('hidden');

  if (won) {
    title.textContent = G.isSurvival ? '🔥 生存模式 +1！' : (G.isZen ? '🧘 禅心通达' : '🎉 通关成功！');
    const { coins, dailyBonus, speedMult, itemMult, fairBonus } = computeCoins();
    const score = computeScore();
    
    SAVE.coins += coins;
    
    // 更新成就统计
    updateAchievementStats({
      totalWins: (SAVE.achievements.stats.totalWins || 0) + 1,
      bestMediumTime: G.diffKey === 'medium' ? Math.min(SAVE.achievements.stats.bestMediumTime || Infinity, G.timer) : undefined,
      noFlagWin: G.noFlagUsed ? true : undefined,
      itemsUsedTotal: (SAVE.achievements.stats.itemsUsedTotal || 0) + G.itemsUsed,
      maxCoins: Math.max(SAVE.achievements.stats.maxCoins || 0, SAVE.coins),
      zenWins: G.isZen ? (SAVE.achievements.stats.zenWins || 0) + 1 : undefined,
      skinsOwned: SAVE.ownedSkins.length
    });

    const best = SAVE.best[G.diffKey];
    let newRecord = false;
    if (!G.isZen && best) {
      if (best.time === null || G.timer < best.time) { best.time = G.timer; newRecord = true; }
      if (score > best.score) { best.score = score; newRecord = true; }
    }

    if (newRecord) badge.classList.remove('hidden');

    let statsHTML = '';
    if (G.isSurvival) {
      statsHTML = `
        <div>当前连胜 <b>${SAVE.survival.currentStreak}</b></div>
        <div>最高连胜 <b>${SAVE.survival.maxStreak}</b></div>
        <div>下一关等级 <b>${SAVE.survival.currentLevel}</b></div>
      `;
    } else if (!G.isZen) {
      statsHTML = `
        <div>用时 <b>${fmtTime(G.timer)}</b></div>
        <div>本局分数 <b>${score}</b></div>
        <div>历史最佳用时 <b>${best.time !== null ? fmtTime(best.time) : '--'}</b></div>
        <div>历史最佳分数 <b>${best.score}</b></div>
        <div>使用道具次数 <b>${G.itemsUsed}</b></div>
      `;
    } else {
      statsHTML = `<div>禅模式完成 <b>平和心境</b></div>`;
    }
    stats.innerHTML = statsHTML;
    
    earnEl.innerHTML = `🪙 获得 ${coins} 金币` + (dailyBonus ? ` (含每日首胜 +${dailyBonus})` : '');
    Sound.coin();
    
    // 检查成就
    checkAchievements();
    
  } else {
    title.textContent = '💥 踩到地雷了';
    stats.innerHTML = `
      <div>用时 <b>${fmtTime(G.timer)}</b></div>
      <div>难度 <b>${G.isSurvival ? '生存 Lv.' + SAVE.survival.currentLevel : DIFF_LABEL[G.diffKey]}</b></div>
    `;
    if (SAVE.ownedItems.undo > 0 && G.undoSnapshot) {
      earnEl.innerHTML = `你还有 ↩️ 撤销道具，可以救回这一局`;
      const btnUndo = document.createElement('button');
      btnUndo.className = 'primary-btn gradient-btn';
      btnUndo.textContent = '↩️ 使用撤销 (剩 ' + SAVE.ownedItems.undo + ')';
      btnUndo.style.marginBottom = '8px';
      btnUndo.onclick = () => {
        useUndoItem();
        modal.classList.add('hidden');
      };
      stats.after(btnUndo);
      btnUndo.id = 'temp-undo-btn';
    } else {
      earnEl.textContent = '没有获得金币，再试一次吧';
    }
  }

  saveState(SAVE);
  refreshCoinDisplays();
  modal.classList.remove('hidden');
}


function useUndoItem() {
  if (!G.undoSnapshot) return;
  SAVE.ownedItems.undo -= 1;
  saveState(SAVE);
  G.over = false;
  const snap = G.undoSnapshot.cells;
  for (let r = 0; r < G.rows; r++) {
    for (let c = 0; c < G.cols; c++) {
      G.board[r][c].revealed = snap[r][c].revealed;
      G.board[r][c].flagged = snap[r][c].flagged;
      renderCell(r, c);
    }
  }
  G.timer = G.undoSnapshot.timer;
  $('#timer').textContent = G.timer;
  G.revealedSafe = 0;
  for (let r = 0; r < G.rows; r++) {
    for (let c = 0; c < G.cols; c++) {
      if (G.board[r][c].revealed && !G.board[r][c].mine) G.revealedSafe++;
    }
  }
  G.itemsUsed++;
  startTimer();
  renderItemsBar();
  toast('已撤销，继续加油！');
}

/* =========================================================
   道具系统
========================================================= */
function renderItemsBar() {
  const bar = $('#items-bar');
  bar.innerHTML = '';
  Object.keys(ITEMS).forEach(key => {
    if (key === 'undo') return;
    const owned = SAVE.ownedItems[key] || 0;
    const chip = document.createElement('div');
    chip.className = 'item-chip' + (owned <= 0 ? ' disabled' : '');
    chip.innerHTML = `<span>${ITEMS[key].icon} ${ITEMS[key].name}</span><span class="count">${owned}</span>`;
    chip.onclick = () => useItem(key);
    bar.appendChild(chip);
  });
}

function useItem(key) {
  if (!G || G.over) return;
  if ((SAVE.ownedItems[key] || 0) <= 0) { toast('道具不足，去商城买一点吧'); return; }

  if (key === 'scan') {
    const hiddenSafe = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && !cell.flagged && !cell.mine) hiddenSafe.push([r, c]);
      }
    }
    if (!hiddenSafe.length) { toast('已经没有可揭示的安全格了'); return; }
    const [r, c] = hiddenSafe[Math.floor(Math.random() * hiddenSafe.length)];
    if (G.firstClick) {
      placeMines(G.board, G.rows, G.cols, G.mines, r, c);
      G.firstClick = false; G.started = true; startTimer();
    }
    revealCell(r, c);
    checkWin();
  } else if (key === 'autoflag') {
    const hiddenMines = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && !cell.flagged && cell.mine) hiddenMines.push([r, c]);
      }
    }
    if (!hiddenMines.length) { toast('没有可标记的地雷了'); return; }
    const [r, c] = hiddenMines[Math.floor(Math.random() * hiddenMines.length)];
    toggleFlag(r, c);
  } else if (key === 'freeze') {
    if (G.frozen) return;
    G.frozen = true;
    toast('⏸️ 计时暂停 10 秒');
    setTimeout(() => { G.frozen = false; }, 10000);
  } else if (key === 'defuse') {
    const hiddenMines = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && cell.mine) hiddenMines.push([r, c]);
      }
    }
    if (!hiddenMines.length) { toast('没有地雷可以拆除了'); return; }
    const [r, c] = hiddenMines[Math.floor(Math.random() * hiddenMines.length)];
    G.board[r][c].mine = false;
    if (G.board[r][c].flagged) { G.board[r][c].flagged = false; G.flagCount--; }
    G.mines--;
    neighborsOf(r, c, G.rows, G.cols).concat([[r, c]]).forEach(([nr, nc]) => {
      const cell = G.board[nr][nc];
      if (!cell.mine) {
        let n = 0;
        neighborsOf(nr, nc, G.rows, G.cols).forEach(([xr, xc]) => { if (G.board[xr][xc].mine) n++; });
        cell.adj = n;
        if (cell.revealed) renderCell(nr, nc);
      }
    });
    $('#mine-count').textContent = Math.max(0, G.mines - G.flagCount);
    toast('💥 已拆除一个地雷');
    checkWin();
  }

  SAVE.ownedItems[key]--;
  G.itemsUsed++;
  saveState(SAVE);
  renderItemsBar();
}


/* =========================================================
   成就系统
========================================================= */
function updateAchievementStats(updates) {
  if (!SAVE.achievements.stats) SAVE.achievements.stats = {};
  Object.keys(updates).forEach(key => {
    if (updates[key] !== undefined) {
      SAVE.achievements.stats[key] = updates[key];
    }
  });
  saveState(SAVE);
}

function checkAchievements() {
  const newUnlocked = [];
  Object.values(ACHIEVEMENTS).forEach(ach => {
    if (SAVE.achievements.unlocked.includes(ach.id)) return;
    if (ach.check(SAVE.achievements.stats)) {
      SAVE.achievements.unlocked.push(ach.id);
      SAVE.coins += ach.reward;
      newUnlocked.push(ach);
    }
  });
  
  if (newUnlocked.length > 0) {
    saveState(SAVE);
    refreshCoinDisplays();
    newUnlocked.forEach(ach => {
      showAchievementToast(ach);
      Sound.achievement();
    });
  }
}

function showAchievementToast(ach) {
  const toast = $('#achievement-toast');
  toast.querySelector('.achievement-toast-icon').textContent = ach.icon;
  toast.querySelector('.achievement-toast-title').textContent = '🏆 成就解锁：' + ach.name;
  toast.querySelector('.achievement-toast-desc').textContent = ach.desc + ' · +' + ach.reward + ' 🪙';
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 4000);
}

function renderAchievements() {
  const list = $('#achievements-list');
  list.innerHTML = '';
  
  Object.values(ACHIEVEMENTS).forEach(ach => {
    const unlocked = SAVE.achievements.unlocked.includes(ach.id);
    const div = document.createElement('div');
    div.className = 'achievement-item glass-card ' + (unlocked ? 'unlocked' : 'locked');
    div.innerHTML = `
      <div class="achievement-icon">${ach.icon}</div>
      <div class="achievement-info">
        <div class="achievement-title">${ach.name}</div>
        <div class="achievement-desc">${ach.desc}</div>
        <div class="achievement-reward">奖励: ${ach.reward} 🪙</div>
      </div>
    `;
    list.appendChild(div);
  });
  
  const unlocked = SAVE.achievements.unlocked.length;
  const total = Object.keys(ACHIEVEMENTS).length;
  const points = SAVE.achievements.unlocked.reduce((sum, id) => {
    const ach = Object.values(ACHIEVEMENTS).find(a => a.id === id);
    return sum + (ach ? ach.reward : 0);
  }, 0);
  
  $('#achievements-unlocked').textContent = unlocked;
  $('#achievements-total').textContent = total;
  $('#achievements-points').textContent = points;
}


/* =========================================================
   每日签到系统
========================================================= */
function renderDailyCheckIn() {
  const today = todayStr();
  const lastCheckIn = SAVE.daily.lastCheckIn;
  const canCheckIn = !lastCheckIn || lastCheckIn !== today;
  
  const statusDiv = $('#daily-status');
  const messageDiv = $('#daily-message');
  const btnCheckIn = $('#btn-do-checkin');
  
  if (canCheckIn) {
    messageDiv.innerHTML = `
      <div style="font-size:18px; font-weight:700; margin-bottom:8px;">✨ 可以签到了！</div>
      <div style="color:var(--text-dim);">连续签到 ${SAVE.daily.consecutiveDays} 天</div>
    `;
    btnCheckIn.disabled = false;
    btnCheckIn.textContent = '立即签到';
  } else {
    messageDiv.innerHTML = `
      <div style="font-size:18px; font-weight:700; margin-bottom:8px;">✅ 今日已签到</div>
      <div style="color:var(--text-dim);">连续签到 ${SAVE.daily.consecutiveDays} 天</div>
      <div style="color:var(--text-dim); font-size:13px; margin-top:8px;">明天记得回来哦！</div>
    `;
    btnCheckIn.disabled = true;
    btnCheckIn.textContent = '已签到';
  }
  
  // 渲染签到奖励日历
  const rewardsGrid = $('#daily-rewards-grid');
  rewardsGrid.innerHTML = '';
  const rewards = [10, 15, 20, 30, 40, 60, 100];
  for (let i = 0; i < 7; i++) {
    const day = document.createElement('div');
    const isClaimed = SAVE.daily.consecutiveDays > i;
    const isToday = canCheckIn && SAVE.daily.consecutiveDays === i;
    day.className = 'reward-day' + (isClaimed ? ' claimed' : '') + (isToday ? ' today' : '');
    day.innerHTML = `
      <div class="reward-day-label">第${i + 1}天</div>
      <div class="reward-day-value">${rewards[i]}</div>
    `;
    rewardsGrid.appendChild(day);
  }
  
  // 渲染签到历史
  const historyList = $('#daily-history-list');
  if (SAVE.daily.history.length === 0) {
    historyList.innerHTML = '<div style="text-align:center; color:var(--text-dim);">暂无签到记录</div>';
  } else {
    historyList.innerHTML = SAVE.daily.history.slice(-10).reverse().map(record => {
      return `<div class="history-item"><span>${record.date}</span><span>+${record.reward} 🪙</span></div>`;
    }).join('');
  }
}

function doCheckIn() {
  const today = todayStr();
  const lastCheckIn = SAVE.daily.lastCheckIn;
  
  if (lastCheckIn === today) {
    toast('今天已经签到过了');
    return;
  }
  
  // 检查连续性
  const yesterday = new Date(getUserDate());
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = yesterday.getFullYear() + '-' + (yesterday.getMonth() + 1) + '-' + yesterday.getDate();
  
  if (lastCheckIn === yesterdayStr) {
    // 连续签到
    SAVE.daily.consecutiveDays++;
  } else if (lastCheckIn === null) {
    // 第一次签到
    SAVE.daily.consecutiveDays = 1;
  } else {
    // 中断了，重新开始
    SAVE.daily.consecutiveDays = 1;
  }
  
  // 如果超过7天，重置到1（循环）
  if (SAVE.daily.consecutiveDays > 7) {
    SAVE.daily.consecutiveDays = 1;
  }
  
  const rewards = [10, 15, 20, 30, 40, 60, 100];
  const reward = rewards[SAVE.daily.consecutiveDays - 1];
  
  SAVE.coins += reward;
  SAVE.daily.lastCheckIn = today;
  SAVE.daily.totalCheckIns++;
  SAVE.daily.history.push({ date: today, reward });
  
  // 更新成就统计
  updateAchievementStats({ 
    dailyStreak: SAVE.daily.consecutiveDays,
    maxCoins: Math.max(SAVE.achievements.stats.maxCoins || 0, SAVE.coins)
  });
  
  saveState(SAVE);
  checkAchievements();
  
  Sound.coin();
  Vibration.success();
  toast(`✅ 签到成功！获得 ${reward} 金币`);
  
  refreshCoinDisplays();
  renderDailyCheckIn();
}

   屏幕切换
========================================================= */

  $all('.screen').forEach(s => s.classList.remove('active'));

  } else if (id === 'screen-achievements') {
    renderAchievements();
  } else if (id === 'screen-daily') {
    renderDailyCheckIn();
  }
}

function renderRecordsBox() {
  const box = $('#records-box');
  const rows = ['easy', 'medium', 'hard'].map(k => {
    const b = SAVE.best[k];
    return `<div class="rec-row"><span>${DIFF_LABEL[k]}最佳</span><b>${b.time !== null ? fmtTime(b.time) : '--'} · ${b.score}分</b></div>`;
  }).join('');
  box.innerHTML = '<div style="margin-bottom:10px;color:var(--text-main);font-weight:800;font-size:14px;">🏆 个人记录</div>' + rows;
}

function updateSurvivalDisplay() {
  $('#current-streak').textContent = SAVE.survival.currentStreak;
  $('#best-streak').textContent = SAVE.survival.maxStreak;
  const bonus = 1 + (SAVE.survival.currentStreak * 0.1);
  $('#streak-bonus').textContent = '×' + bonus.toFixed(1);
}

/* =========================================================
   首页：难度选择
========================================================= */
let selectedDiff = null;

$all('.diff-card').forEach(card => {
  card.addEventListener('click', () => {
    const isZen = card.dataset.zen === 'true';
    const diff = card.dataset.diff;
    
    if (!isZen) {
      $all('.diff-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedDiff = diff;
      
      if (selectedDiff === 'custom') {
        $('#custom-panel').classList.remove('hidden');
        updateDensityTag();
      } else {
        $('#custom-panel').classList.add('hidden');
        startGame(selectedDiff);
      }
    } else {
      // 禅模式直接开始
      startGame(diff, null, true, false);
    }
  });
});

function updateDensityTag() {
  const rows = +$('#slider-rows').value;
  const cols = +$('#slider-cols').value;
  let mineSlider = $('#slider-mines');
  const maxMines = Math.max(1, (rows - 1) * (cols - 1));
  mineSlider.max = maxMines;
  if (+mineSlider.value > maxMines) mineSlider.value = maxMines;
  const mines = +mineSlider.value;

  $('#val-rows').textContent = rows;
  $('#val-cols').textContent = cols;
  $('#val-mines').textContent = mines;

  const info = densityInfo(rows, cols, mines);
  $('#density-tag').textContent = `密度 ${info.pct}% · ${info.label}`;
}

['slider-rows', 'slider-cols', 'slider-mines'].forEach(id => {
  $('#' + id).addEventListener('input', updateDensityTag);
});

$('#btn-custom-start').addEventListener('click', () => {
  const rows = +$('#slider-rows').value;
  const cols = +$('#slider-cols').value;
  const mines = +$('#slider-mines').value;
  startGame('custom', { rows, cols, mines });
});

function renderShop() {
  refreshCoinDisplays();
  
  // 道具
  const itemsGrid = $('#shop-items');
  itemsGrid.innerHTML = '';
  Object.keys(ITEMS).forEach(key => {
    const it = ITEMS[key];
    const owned = SAVE.ownedItems[key] || 0;
    const card = document.createElement('div');
    card.className = 'shop-card glass-card';
    card.innerHTML = `
      <div class="icon">${it.icon}</div>
      <div class="name">${it.name}</div>
      <div class="desc">${it.desc}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">已持有 ${owned}</div>
      <button class="buy">🪙 ${it.price} 购买</button>
    `;
    card.querySelector('button').onclick = () => {
      if (SAVE.coins < it.price) { toast('金币不够啦'); return; }
      SAVE.coins -= it.price;
      SAVE.ownedItems[key] = (SAVE.ownedItems[key] || 0) + 1;
      saveState(SAVE);
      Sound.buy();
      renderShop();
      if (G && !G.over) renderItemsBar();
    };
    itemsGrid.appendChild(card);
  });

  // 皮肤
  const skinsGrid = $('#shop-skins');
  skinsGrid.innerHTML = '';
  Object.keys(SKINS).forEach(key => {
    const sk = SKINS[key];
    const owned = SAVE.ownedSkins.includes(key);
    const equipped = SAVE.activeSkin === key;
    const card = document.createElement('div');
    card.className = 'shop-card glass-card';
    card.innerHTML = `
      <div class="icon">${sk.icon}</div>
      <div class="name">${sk.name}</div>
      <div class="desc">${key === 'classic' ? '默认皮肤' : '主题皮肤'}</div>
      <button class="${equipped ? 'equipped' : (owned ? 'owned' : 'buy')}">
        ${equipped ? '✅ 使用中' : (owned ? '装备' : '🪙 ' + sk.price + ' 购买')}
      </button>
    `;
    card.querySelector('button').onclick = () => {
      if (equipped) return;
      if (!owned) {
        if (SAVE.coins < sk.price) { toast('金币不够啦'); return; }
        SAVE.coins -= sk.price;
        SAVE.ownedSkins.push(key);
        Sound.buy();
      }
      SAVE.activeSkin = key;
      applySkin();
      saveState(SAVE);
      updateAchievementStats({ skinsOwned: SAVE.ownedSkins.length });
      renderShop();
      refreshCoinDisplays();
    };
    skinsGrid.appendChild(card);
  });

  // 背景
  const bgGrid = $('#shop-backgrounds');
  bgGrid.innerHTML = '';
  Object.keys(BACKGROUNDS).forEach(key => {
    const bg = BACKGROUNDS[key];
    const owned = SAVE.ownedBackgrounds.includes(key);
    const equipped = SAVE.activeBackground === key;
    const card = document.createElement('div');
    card.className = 'shop-card glass-card';
    card.innerHTML = `
      <div class="icon">${bg.icon}</div>
      <div class="name">${bg.name}</div>
      <div class="desc">${bg.desc}</div>
      <button class="${equipped ? 'equipped' : (owned ? 'owned' : 'buy')}">
        ${equipped ? '✅ 使用中' : (owned ? '装备' : '🪙 ' + bg.price + ' 购买')}
      </button>
    `;
    card.querySelector('button').onclick = () => {
      if (equipped) return;
      if (!owned) {
        if (SAVE.coins < bg.price) { toast('金币不够啦'); return; }
        SAVE.coins -= bg.price;
        SAVE.ownedBackgrounds.push(key);
        Sound.buy();
      }
      SAVE.activeBackground = key;
      applySkin();
      saveState(SAVE);
      renderShop();
      refreshCoinDisplays();
    };
    bgGrid.appendChild(card);
  });

  // 音效包
  const soundGrid = $('#shop-sounds');
  soundGrid.innerHTML = '';
  Object.keys(SOUND_PACKS).forEach(key => {
    const sp = SOUND_PACKS[key];
    const owned = SAVE.ownedSounds.includes(key);
    const equipped = SAVE.activeSound === key;
    const card = document.createElement('div');
    card.className = 'shop-card glass-card';
    card.innerHTML = `
      <div class="icon">${sp.icon}</div>
      <div class="name">${sp.name}</div>
      <div class="desc">${sp.desc}</div>
      <button class="${equipped ? 'equipped' : (owned ? 'owned' : 'buy')}">
        ${equipped ? '✅ 使用中' : (owned ? '装备' : '🪙 ' + sp.price + ' 购买')}
      </button>
    `;
    card.querySelector('button').onclick = () => {
      if (equipped) return;
      if (!owned) {
        if (SAVE.coins < sp.price) { toast('金币不够啦'); return; }
        SAVE.coins -= sp.price;
        SAVE.ownedSounds.push(key);
        Sound.buy();
      }
      SAVE.activeSound = key;
      saveState(SAVE);
      toast('🔊 音效已切换为：' + sp.name);
      renderShop();
      refreshCoinDisplays();
    };
    soundGrid.appendChild(card);
  });

  // 特效
  const effectGrid = $('#shop-effects');
  effectGrid.innerHTML = '';
  Object.keys(EFFECTS).forEach(key => {
    const ef = EFFECTS[key];
    const owned = SAVE.ownedEffects.includes(key);
    const equipped = SAVE.activeEffect === key;
    const card = document.createElement('div');
    card.className = 'shop-card glass-card';
    card.innerHTML = `
      <div class="icon">${ef.icon}</div>

        ${equipped ? '✅ 使用中' : (owned ? '装备' : '🪙 ' + ef.price + ' 购买')}
      </button>
    `;
    card.querySelector('button').onclick = () => {
      if (equipped) return;
      if (!owned) {
        if (SAVE.coins < ef.price) { toast('金币不够啦'); return; }
        SAVE.coins -= ef.price;
        SAVE.ownedEffects.push(key);
        Sound.buy();
      }
      SAVE.activeEffect = key;
      saveState(SAVE);
      toast('✨ 特效已切换为：' + ef.name);
      renderShop();
      refreshCoinDisplays();
    };
    effectGrid.appendChild(card);
  });
}
