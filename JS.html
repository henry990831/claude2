    s = createDefaultSave();
    saveState(s);

    const defaults = createDefaultSave();
    s = { ...defaults, ...s };
    if (!s.rank) s.rank = defaults.rank;
    if (!s.statistics) s.statistics = defaults.statistics;
    if (!s.eyeProtection) s.eyeProtection = defaults.eyeProtection;
    if (!s.musicPlayer) s.musicPlayer = defaults.musicPlayer;

    if (typeof s.settings.noGuess === 'undefined') s.settings.noGuess = true;
  }
  return s;
}

/* =========================================================
   音效系统（支持不同音效包）
========================================================= */
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, dur, type, gain, pack) {
  try {
    const ctx = ac();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    
    // 根据音效包调整参数
    if (pack === 'retro') {
      type = 'square';
      freq *= 0.8;
      gain *= 1.2;
    } else if (pack === 'nature') {
      type = 'sine';
      gain *= 0.6;
      dur *= 1.5;
    } else if (pack === 'scifi') {
      type = 'sawtooth';
      freq *= 1.3;
    }
    
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    g.gain.value = (gain || 0.08) * (SAVE.musicPlayer.sfxVolume || 0.6);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

/* =========================================================
   游戏核心逻辑
========================================================= */
let G = null;

function densityInfo(rows, cols, mines) {
  const density = mines / (rows * cols);
  let labelKey = 'dens_tooeasy';
  if (density >= 0.25) labelKey = 'dens_hell';
  else if (density >= 0.20) labelKey = 'dens_hard';
  else if (density >= 0.15) labelKey = 'dens_medium';
  else if (density >= 0.10) labelKey = 'dens_easy';
  return { pct: Math.round(density * 100), labelKey, label: t(labelKey) };
}

function customBaseAndPar(rows, cols, mines) {
  const base = Math.max(3, Math.round(rows * cols * 0.03 + mines * 0.35));
  const par = Math.max(20, Math.round(rows * cols * 0.7 + mines * 1.2));
  return { base, par };
}


function buildEmptyBoard(rows, cols) {
  const board = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({ mine: false, revealed: false, flagged: false, adj: 0, specialType: null });
    }
    board.push(row);
  }
  return board;
}

function neighborsOf(r, c, rows, cols) {
  const list = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) list.push([nr, nc]);
    }
  }
  return list;
}

function placeMines(board, rows, cols, mines, safeR, safeC, isSpecialMode) {
  const safeSet = new Set();
  safeSet.add(safeR + '_' + safeC);
  neighborsOf(safeR, safeC, rows, cols).forEach(([r, c]) => safeSet.add(r + '_' + c));

  const candidates = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!safeSet.has(r + '_' + c)) candidates.push([r, c]);
    }
  }

  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }

  const m = Math.min(mines, candidates.length);
  for (let i = 0; i < m; i++) {
    const [r, c] = candidates[i];
    board[r][c].mine = true;
    
    // 特殊地雷模式
    if (isSpecialMode) {
      const rand = Math.random();
      if (rand < 0.05) board[r][c].specialType = 'treasure';
      else if (rand < 0.15) board[r][c].specialType = 'chain';
      else if (rand < 0.20) board[r][c].specialType = 'freeze';
      else if (rand < 0.25) board[r][c].specialType = 'mystery';
    }
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      let n = 0;
      neighborsOf(r, c, rows, cols).forEach(([nr, nc]) => {
        if (board[nr][nc].mine) n++;
      });
      board[r][c].adj = n;
    }
  }
  return m;
}

/* =========================================================
   无猜模式（No-Guess）：布雷 + 逻辑求解器
   目标：保证每一局都能纯靠推理通关，不需要赌雷。
   做法：随机布雷 -> 用求解器模拟 -> 若能全解则采用，
        否则重新布雷；在时间预算内取"可推理覆盖最多"的盘面。
========================================================= */
function clearBoardMines(board, rows, cols) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      board[r][c].mine = false;
      board[r][c].adj = 0;
      board[r][c].specialType = null;
    }
  }
}

function computeAdjacency(board, rows, cols) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) { board[r][c].adj = 0; continue; }
      let n = 0;
      neighborsOf(r, c, rows, cols).forEach(([nr, nc]) => { if (board[nr][nc].mine) n++; });
      board[r][c].adj = n;
    }
  }
}

function snapshotMines(board, rows, cols) {
  const arr = [];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (board[r][c].mine) arr.push(r * cols + c);
  return arr;
}

function applyMineSnapshot(board, rows, cols, mineIdxs) {
  clearBoardMines(board, rows, cols);
  for (const idx of mineIdxs) board[Math.floor(idx / cols)][idx % cols].mine = true;
  computeAdjacency(board, rows, cols);
}

// 逻辑求解器：返回纯推理能揭开的安全格数量
function boardSolveCoverage(board, rows, cols, sr, sc) {
  // state: 0 未知, 1 已揭开(安全), 2 已确定为雷
  const state = [];
  for (let r = 0; r < rows; r++) state.push(new Array(cols).fill(0));

  const revealFlood = (r, c) => {
    const st = [[r, c]];
    while (st.length) {
      const [cr, cc] = st.pop();
      if (state[cr][cc] !== 0) continue;
      if (board[cr][cc].mine) continue;
      state[cr][cc] = 1;
      if (board[cr][cc].adj === 0) {
        neighborsOf(cr, cc, rows, cols).forEach(([nr, nc]) => { if (state[nr][nc] === 0) st.push([nr, nc]); });
      }
    }
  };

  revealFlood(sr, sc);

  let changed = true;
  while (changed) {
    changed = false;
    // 基础规则：满足数字则周围安全 / 剩余全是雷
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (state[r][c] !== 1) continue;
        const adj = board[r][c].adj;
        if (adj === 0) continue;
        const nbrs = neighborsOf(r, c, rows, cols);
        const hidden = [];
        let flagged = 0;
        for (const [nr, nc] of nbrs) {
          if (state[nr][nc] === 0) hidden.push([nr, nc]);
          else if (state[nr][nc] === 2) flagged++;
        }
        if (hidden.length === 0) continue;
        const remaining = adj - flagged;
        if (remaining === 0) {
          for (const [nr, nc] of hidden) revealFlood(nr, nc);
          changed = true;
        } else if (remaining === hidden.length) {
          for (const [nr, nc] of hidden) state[nr][nc] = 2;
          changed = true;
        }
      }
    }
    if (changed) continue;

    // 子集规则（能解 1-2-1 等更复杂图案）
    const cons = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (state[r][c] !== 1) continue;
        const adj = board[r][c].adj;
        if (adj === 0) continue;
        const nbrs = neighborsOf(r, c, rows, cols);
        const hidden = [];
        let flagged = 0;
        for (const [nr, nc] of nbrs) {
          if (state[nr][nc] === 0) hidden.push(nr * cols + nc);
          else if (state[nr][nc] === 2) flagged++;
        }
        if (hidden.length > 0) cons.push({ cells: hidden, set: new Set(hidden), rem: adj - flagged });
      }
    }
    for (let i = 0; i < cons.length && !changed; i++) {
      for (let j = 0; j < cons.length; j++) {
        if (i === j) continue;
        const A = cons[i], B = cons[j];
        if (A.cells.length >= B.cells.length) continue;
        let subset = true;
        for (const x of A.cells) { if (!B.set.has(x)) { subset = false; break; } }
        if (!subset) continue;
        const diffRem = B.rem - A.rem;
        const diffCount = B.cells.length - A.cells.length;
        if (diffRem === 0) {
          for (const x of B.cells) if (!A.set.has(x)) { const rr = Math.floor(x / cols), cc = x % cols; if (state[rr][cc] === 0) { revealFlood(rr, cc); changed = true; } }
        } else if (diffRem === diffCount) {
          for (const x of B.cells) if (!A.set.has(x)) { const rr = Math.floor(x / cols), cc = x % cols; if (state[rr][cc] === 0) { state[rr][cc] = 2; changed = true; } }
        }
        if (changed) break;
      }
    }
  }

  let revealed = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (state[r][c] === 1) revealed++;
  return revealed;
}

function generateSolvableBoard(board, rows, cols, mines, sr, sc, isSpecial) {
  // 特殊地雷模式本身就是"混沌玩法"，不强制无猜
  const wantNoGuess = !isSpecial && !(SAVE.settings && SAVE.settings.noGuess === false);
  let placed = placeMines(board, rows, cols, mines, sr, sc, isSpecial);
  if (!wantNoGuess) return placed;

  const total = rows * cols;
  const safeTotal = total - placed;
  let cov = boardSolveCoverage(board, rows, cols, sr, sc);
  if (cov >= safeTotal) return placed; // 首次就完全可解

  let best = { coverage: cov, mines: snapshotMines(board, rows, cols) };
  const deadline = Date.now() + 500; // 时间预算，避免第一下卡死
  let attempts = 0;
  const maxAttempts = 600;

  while (Date.now() < deadline && attempts < maxAttempts) {
    attempts++;
    clearBoardMines(board, rows, cols);
    placeMines(board, rows, cols, mines, sr, sc, isSpecial);
    cov = boardSolveCoverage(board, rows, cols, sr, sc);
    if (cov >= safeTotal) return placed; // 找到完全可解盘面
    if (cov > best.coverage) best = { coverage: cov, mines: snapshotMines(board, rows, cols) };
  }

  // 时间/次数用尽：采用"可推理覆盖最多"的盘面（把要赌的地方降到最少）
  applyMineSnapshot(board, rows, cols, best.mines);
  return best.mines.length;
}

function startGame(diffKey, customCfg, isZen = false, isSurvival = false, isSpecial = false) {
  let rows, cols, mines, base, par;

  if (isSurvival) {
    const level = SAVE.survival.currentLevel;
    rows = Math.min(9 + Math.floor(level / 3), 20);
    cols = Math.min(9 + Math.floor(level / 3), 20);
    mines = Math.min(10 + level * 2, Math.floor(rows * cols * 0.2));
    const cp = customBaseAndPar(rows, cols, mines);
    base = cp.base * (1 + level * 0.1);
    par = cp.par;
  } else if (diffKey === 'custom') {
    rows = customCfg.rows;
    cols = customCfg.cols;
    mines = customCfg.mines;
    const cp = customBaseAndPar(rows, cols, mines);
    base = cp.base;
    par = cp.par;
  } else {
    const d = DIFFS[diffKey];
    rows = d.rows;
    cols = d.cols;
    mines = d.mines;
    base = d.base;
    par = d.par;
  }

  if (isSpecial) base = Math.round(base * 1.3);

  G = {
    diffKey, rows, cols, mines, origMines: mines, base, par,
    board: buildEmptyBoard(rows, cols),
    started: false, over: false, firstClick: true,
    timer: 0, timerInt: null, frozen: false, flagMode: false,
    itemsUsed: 0, flagCount: 0, revealedSafe: 0, undoSnapshot: null,
    isZen, isSurvival, isSpecial, noFlagUsed: true,
    moveHistory: [], // 记录所有操作
    mistakes: []     // 记录失误
  };

  renderGame();
  showScreen('screen-game');
  playTimeStart = Date.now();
}

function renderGame() {
  const cellSize = G.cols <= 9 ? 34 : G.cols <= 16 ? 28 : G.cols <= 22 ? 24 : 20;
  const boardEl = $('#board');
  boardEl.style.gridTemplateColumns = `repeat(${G.cols}, ${cellSize}px)`;
  boardEl.innerHTML = '';
  G.cellEls = [];

  for (let r = 0; r < G.rows; r++) {
    const rowEls = [];
    for (let c = 0; c < G.cols; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.style.width = cellSize + 'px';
      div.style.height = cellSize + 'px';
      div.style.fontSize = Math.round(cellSize * 0.45) + 'px';
      div.dataset.r = r;
      div.dataset.c = c;
      div.addEventListener('click', onCellClick);
      div.addEventListener('contextmenu', onCellRightClick);
      boardEl.appendChild(div);
      rowEls.push(div);
    }
    G.cellEls.push(rowEls);
  }

  $('#mine-count').textContent = G.mines;
  $('#timer').textContent = '0';

  const timerDisplay = $('#timer-display');
  if (G.isZen) timerDisplay.classList.add('hidden');
  else timerDisplay.classList.remove('hidden');

  $('#btn-flag-mode').classList.remove('active-mode');
  renderItemsBar();
}


function startTimer() {
  if (G.isZen) return;
  G.timerInt = setInterval(() => {
    if (G.frozen) return;
    G.timer++;
    $('#timer').textContent = G.timer;
  }, 1000);
}

function stopTimer() {
  clearInterval(G.timerInt);
}

let pendingClick = null;
const DBLCLICK_WINDOW = 240;

function onCellClick(e) {
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!G || G.over) return;

  if (G.flagMode) {
    if (pendingClick) { clearTimeout(pendingClick.timerId); pendingClick = null; }
    const cell = G.board[r][c];
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }

  if (pendingClick && pendingClick.r === r && pendingClick.c === c) {
    clearTimeout(pendingClick.timerId);
    pendingClick = null;
    const cell = G.board[r][c];
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }
  if (pendingClick) { clearTimeout(pendingClick.timerId); pendingClick = null; }

  const timerId = setTimeout(() => {
    pendingClick = null;
    handlePrimaryAction(r, c);
  }, DBLCLICK_WINDOW);
  pendingClick = { r, c, timerId };
}

function onCellRightClick(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!G || G.over) return;
  if (pendingClick && pendingClick.r === r && pendingClick.c === c) {
    clearTimeout(pendingClick.timerId);
    pendingClick = null;
  }
  const cell = G.board[r][c];
  if (!cell.revealed) toggleFlag(r, c);
}

function handlePrimaryAction(r, c) {
  if (!G || G.over) return;
  const cell = G.board[r][c];

  if (G.flagMode) {
    if (!cell.revealed) toggleFlag(r, c);
    return;
  }

  if (cell.flagged) return;

  if (cell.revealed) {
    if (cell.adj > 0) {
      const nbrs = neighborsOf(r, c, G.rows, G.cols);
      const flagged = nbrs.filter(([nr, nc]) => G.board[nr][nc].flagged).length;
      if (flagged === cell.adj) {
        // 记录和弦操作
        G.moveHistory.push({
          type: 'chord',
          r, c,
          time: G.timer,
          timestamp: Date.now()
        });
        
        // 统计点击
        SAVE.statistics.totalClicks++;
        
        nbrs.forEach(([nr, nc]) => {
          if (!G.board[nr][nc].flagged && !G.board[nr][nc].revealed) revealCell(nr, nc);
        });
        checkWin();
      }
    }
    return;
  }

  if (G.firstClick) {
    snapshotBoard();
    const placed = generateSolvableBoard(G.board, G.rows, G.cols, G.mines, r, c, G.isSpecial);
    G.mines = placed;
    $('#mine-count').textContent = Math.max(0, G.mines - G.flagCount);
    G.firstClick = false;
    G.started = true;
    startTimer();
  } else {
    snapshotBoard();
  }

  // 记录点击操作
  G.moveHistory.push({
    type: 'reveal',
    r, c,
    time: G.timer,
    timestamp: Date.now()
  });
  
  // 统计点击
  SAVE.statistics.totalClicks++;

  revealCell(r, c);
  if (!G.over) checkWin();
}

function snapshotBoard() {
  G.undoSnapshot = {
    cells: G.board.map(row => row.map(cell => ({ revealed: cell.revealed, flagged: cell.flagged }))),
    timer: G.timer
  };
}

function revealCell(r, c) {
  const cell = G.board[r][c];
  if (cell.revealed || cell.flagged) return;

  const stack = [[r, c]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const cur = G.board[cr][cc];
    if (cur.revealed || cur.flagged) continue;
    cur.revealed = true;
    G.revealedSafe += cur.mine ? 0 : 1;
    renderCell(cr, cc);

    if (cur.mine) {
      if (G.isSpecial && cur.specialType) {
        handleSpecialMine(cr, cc, cur.specialType);
      } else {
        triggerLose(cr, cc);
      }
      return;
    }
    Sound.open();
    if (cur.adj === 0) {
      neighborsOf(cr, cc, G.rows, G.cols).forEach(([nr, nc]) => {
        if (!G.board[nr][nc].revealed && !G.board[nr][nc].flagged) stack.push([nr, nc]);
      });
    }
  }
}

function handleSpecialMine(r, c, type) {
  if (type === 'treasure') {
    const coins = Math.floor(Math.random() * 11) + 5;
    SAVE.coins += coins;
    saveState(SAVE);
    refreshCoinDisplays();
    toast(`${t('treasureFound')} ${coins} ${t('coins')}`);
    Sound.coin();
    G.board[r][c].mine = false;
    checkWin();
  } else if (type === 'freeze') {
    toast(t('freezeMine'));
    G.frozen = true;
    setTimeout(() => { G.frozen = false; }, 5000);
    G.board[r][c].mine = false;
    checkWin();
  } else if (type === 'chain') {
    toast(t('chainMine'));
    Vibration.error();
    const nbrs = neighborsOf(r, c, G.rows, G.cols);
    nbrs.forEach(([nr, nc]) => {
      if (G.board[nr][nc].mine) {
        G.board[nr][nc].revealed = true;
        renderCell(nr, nc);
      }
    });
    triggerLose(r, c);
  } else if (type === 'mystery') {
    const rand = Math.random();
    if (rand < 0.30) {
      const coins = 20;
      SAVE.coins += coins;
      saveState(SAVE);
      refreshCoinDisplays();
      toast(`${t('mysteryCoins')} ${coins} ${t('coins')}!`);
      Sound.coin();
      G.board[r][c].mine = false;
      checkWin();
    } else if (rand < 0.55) {
      toast(t('mysteryReveal'));
      const nbrs = neighborsOf(r, c, G.rows, G.cols).concat([[r, c]]);
      nbrs.forEach(([nr, nc]) => {
        if (!G.board[nr][nc].mine && !G.board[nr][nc].revealed) {
          G.board[nr][nc].revealed = true;
          G.revealedSafe++;
          renderCell(nr, nc);
        }
      });
      G.board[r][c].mine = false;
      checkWin();
    } else if (rand < 0.75) {
      toast(t('mysteryFlag'));
      let marked = 0;
      for (let rr = 0; rr < G.rows && marked < 3; rr++) {
        for (let cc = 0; cc < G.cols && marked < 3; cc++) {
          if (G.board[rr][cc].mine && !G.board[rr][cc].revealed && !G.board[rr][cc].flagged) {
            toggleFlag(rr, cc);
            marked++;
          }
        }
      }
      G.board[r][c].mine = false;
      checkWin();
    } else if (rand < 0.90) {
      if (G.timer >= 10) {
        G.timer -= 10;
        $('#timer').textContent = G.timer;
        toast(t('mysteryTime'));
      }
      G.board[r][c].mine = false;
      checkWin();
    } else {
      toast(t('mysteryBoom'));
      triggerLose(r, c);
    }
  }
}


function toggleFlag(r, c) {
  const cell = G.board[r][c];
  const wasFlagged = cell.flagged;
  cell.flagged = !cell.flagged;
  G.flagCount += cell.flagged ? 1 : -1;
  $('#mine-count').textContent = G.mines - G.flagCount;
  renderCell(r, c);
  Sound.flag();
  if (cell.flagged) {
    G.noFlagUsed = false;
    // 统计标旗
    SAVE.statistics.totalFlags++;
  }
  
  // 记录标旗操作
  G.moveHistory.push({
    type: cell.flagged ? 'flag' : 'unflag',
    r, c,
    time: G.timer,
    timestamp: Date.now(),
    isMine: cell.mine // 记录是否是真雷
  });
  
  // 检测错误标旗
  if (cell.flagged && !cell.mine) {
    G.mistakes.push({
      type: 'wrong_flag',
      r, c,
      time: G.timer,
      description: t('wrongFlagDesc')
    });
  }
}

function renderCell(r, c) {
  const cell = G.board[r][c];
  const el = G.cellEls[r][c];
  el.classList.remove('pop');
  el.className = 'cell';
  if (cell.revealed) {
    el.classList.add('revealed');
    if (cell.mine) {
      el.classList.add('mine-cell');
      if (cell.specialType) {
        el.textContent = SPECIAL_MINE_TYPES[cell.specialType].icon;
      }
    } else if (cell.adj > 0) {
      el.textContent = cell.adj;
      el.dataset.n = cell.adj;
      
      // 特殊地雷周围数字颜色
      if (G.isSpecial) {
        const nbrs = neighborsOf(r, c, G.rows, G.cols);
        for (const [nr, nc] of nbrs) {
          if (G.board[nr][nc].mine && G.board[nr][nc].specialType) {
            const type = G.board[nr][nc].specialType;
            el.style.color = SPECIAL_MINE_TYPES[type].color;
            break;
          }
        }
      }
    }
    void el.offsetWidth;
    el.classList.add('pop');
  } else if (cell.flagged) {
    el.classList.add('flagged');
  }
}

function triggerLose(r, c) {
  G.over = true;
  stopTimer();
  
  // 记录游戏时长
  SAVE.statistics.totalPlayTime += G.timer;
  SAVE.statistics.lastPlayDate = todayStr();
  if (!SAVE.statistics.firstPlayDate) {
    SAVE.statistics.firstPlayDate = todayStr();
  }
  
  G.cellEls[r][c].classList.add('exploded');
  
  // 记录致命失误 - 标记为最后一步
  G.mistakes.push({
    type: 'fatal',
    r, c,
    time: G.timer,
    description: t('fatalDesc'),
    isLastMove: true  // 标记为最后一步
  });
  
  // 分析失误：找出本可以避免的错误
  analyzeMistakes();

  for (let rr = 0; rr < G.rows; rr++) {
    for (let cc = 0; cc < G.cols; cc++) {
      const cell = G.board[rr][cc];
      if (cell.mine && !cell.revealed) {
        cell.revealed = true;
        renderCell(rr, cc);
      }
    }
  }

  Sound.lose();
  
  if (G.isSurvival) {
    SAVE.survival.currentStreak = 0;
    SAVE.survival.currentLevel = 1;
  }
  
  SAVE.rank.losses++;
  SAVE.statistics.totalLosses++;
  SAVE.statistics.totalGames++;
  updateRank();
  saveState(SAVE);

  setTimeout(() => showResult(false), 600);
}

// 分析失误
function analyzeMistakes() {
  const fatalCell = G.mistakes.find(m => m.type === 'fatal');
  if (!fatalCell) return;
  
  const fr = fatalCell.r, fc = fatalCell.c;
  
  // 检查周围已揭示的数字格子
  const nbrs = neighborsOf(fr, fc, G.rows, G.cols);
  for (const [nr, nc] of nbrs) {
    const cell = G.board[nr][nc];
    if (cell.revealed && cell.adj > 0) {
      // 检查这个数字周围的情况
      const cellNbrs = neighborsOf(nr, nc, G.rows, G.cols);
      const hiddenCount = cellNbrs.filter(([r,c]) => !G.board[r][c].revealed && !G.board[r][c].flagged).length;
      const flaggedCount = cellNbrs.filter(([r,c]) => G.board[r][c].flagged).length;
      const mineCount = cellNbrs.filter(([r,c]) => G.board[r][c].mine).length;
      
      // 如果隐藏格子数等于剩余雷数，说明这些都是雷，应该先标记
      if (cell.adj - flaggedCount === hiddenCount && hiddenCount > 0) {
        G.mistakes.push({
          type: 'should_flag',
          r: nr,
          c: nc,
          time: fatalCell.time - 1,
          description: `数字 ${cell.adj} 周围的隐藏格子都应该先标旗`,
          relatedCells: cellNbrs.filter(([r,c]) => !G.board[r][c].revealed)
        });
        break;
      }
    }
  }
  
  // 检查是否有明显可以推理的安全格子没有点击
  for (let r = 0; r < G.rows; r++) {
    for (let c = 0; c < G.cols; c++) {
      const cell = G.board[r][c];
      if (cell.revealed && cell.adj > 0) {
        const cellNbrs = neighborsOf(r, c, G.rows, G.cols);
        const flaggedCount = cellNbrs.filter(([nr,nc]) => G.board[nr][nc].flagged).length;
        
        // 如果旗子数已经等于数字，周围其他格子都是安全的
        if (flaggedCount === cell.adj) {
          const safeUnrevealed = cellNbrs.filter(([nr,nc]) => 
            !G.board[nr][nc].revealed && !G.board[nr][nc].flagged
          );
          if (safeUnrevealed.length > 0) {
            G.mistakes.push({
              type: 'missed_safe',
              r, c,
              time: fatalCell.time - 2,
              description: `数字 ${cell.adj} 周围已标够旗，其他格子是安全的`,
              relatedCells: safeUnrevealed
            });
          }
        }
      }
    }
  }
}

function checkWin() {
  const total = G.rows * G.cols - G.mines;
  if (G.revealedSafe >= total) {
    G.over = true;
    stopTimer();
    
    // 记录游戏时长
    SAVE.statistics.totalPlayTime += G.timer;
    SAVE.statistics.lastPlayDate = todayStr();
    if (!SAVE.statistics.firstPlayDate) {
      SAVE.statistics.firstPlayDate = todayStr();
    }
    
    Sound.win();
    
    if (G.isSurvival) {
      SAVE.survival.currentStreak++;
      SAVE.survival.currentLevel++;
      if (SAVE.survival.currentStreak > SAVE.survival.maxStreak) {
        SAVE.survival.maxStreak = SAVE.survival.currentStreak;
      }
    }
    
    SAVE.rank.wins++;
    SAVE.statistics.totalWins++;
    SAVE.statistics.totalGames++;
    updateRank();
    
    setTimeout(() => showResult(true), 400);
  }
}

function renderItemsBar() {
  const bar = $('#items-bar');
  if (!bar) return;
  bar.innerHTML = '';
  Object.keys(ITEMS).forEach(key => {
    if (key === 'undo') return;
    const owned = SAVE.ownedItems[key] || 0;
    const chip = document.createElement('div');
    chip.className = 'item-chip' + (owned <= 0 ? ' disabled' : '');
    chip.innerHTML = `<span>${ITEMS[key].icon} ${L(ITEMS[key],'name')}</span><span class="count">${owned}</span>`;
    chip.onclick = () => useItem(key);
    bar.appendChild(chip);
  });
}

function useItem(key) {
  if (!G || G.over) return;
  if ((SAVE.ownedItems[key] || 0) <= 0) { toast(t('itemInsufficient')); return; }

  if (key === 'scan') {
    const hiddenSafe = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && !cell.flagged && !cell.mine) hiddenSafe.push([r, c]);
      }
    }
    if (!hiddenSafe.length) { toast(t('noSafeCell')); return; }
    const [r, c] = hiddenSafe[Math.floor(Math.random() * hiddenSafe.length)];
    if (G.firstClick) {
      G.mines = generateSolvableBoard(G.board, G.rows, G.cols, G.mines, r, c, G.isSpecial);
      G.firstClick = false;
      G.started = true;
      startTimer();
    }
    revealCell(r, c);
    checkWin();
  } else if (key === 'autoflag') {
    const hiddenMines = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && !cell.flagged && cell.mine) hiddenMines.push([r, c]);
      }
    }
    if (!hiddenMines.length) { toast(t('noMineToFlag')); return; }
    const [r, c] = hiddenMines[Math.floor(Math.random() * hiddenMines.length)];
    toggleFlag(r, c);
  } else if (key === 'freeze') {
    if (G.frozen) return;
    G.frozen = true;
    toast(t('freezePaused'));
    setTimeout(() => { G.frozen = false; }, 10000);
  } else if (key === 'defuse') {
    const hiddenMines = [];
    for (let r = 0; r < G.rows; r++) {
      for (let c = 0; c < G.cols; c++) {
        const cell = G.board[r][c];
        if (!cell.revealed && cell.mine) hiddenMines.push([r, c]);
      }
    }
    if (!hiddenMines.length) { toast(t('noMineToDefuse')); return; }
    const [r, c] = hiddenMines[Math.floor(Math.random() * hiddenMines.length)];
    G.board[r][c].mine = false;
    if (G.board[r][c].flagged) { G.board[r][c].flagged = false; G.flagCount--; }
    G.mines--;
    $('#mine-count').textContent = Math.max(0, G.mines - G.flagCount);
    toast(t('defused'));
    checkWin();
  }

  SAVE.ownedItems[key]--;
  G.itemsUsed++;
  SAVE.statistics.totalItemsUsed++;
  saveState(SAVE);
  renderItemsBar();
}

function showResult(won) {
  const modal = $('#modal-result');
  const title = $('#result-title');
  const stats = $('#result-stats');
  const earnEl = $('#coin-earn');

  if (won) {
    title.textContent = G.isSurvival ? t('resultSurvivalTitle') : (G.isZen ? t('resultZenTitle') : t('resultWinTitle'));
    const coins = computeCoins();
    SAVE.coins += coins;
    SAVE.statistics.totalCoinsEarned += coins;
    
    // 记录单局最高
    if (coins > SAVE.statistics.maxSingleEarn) {
      SAVE.statistics.maxSingleEarn = coins;
    }
    
    stats.innerHTML = `
      <div>${t('resultTime')} <b>${fmtTime(G.timer)}</b></div>
      <div>${t('resultOps')} <b>${G.moveHistory.length}</b></div>
      <div>${t('resultCoins')} <b>+${coins}</b></div>
    `;
    earnEl.textContent = `🪙 ${t('resultGot')} ${coins} ${t('coins')}`;
    Sound.coin();
    
    triggerVictoryEffect();
  } else {
    title.textContent = t('resultFail');
    const mistakeCount = G.mistakes.length;
    stats.innerHTML = `
      <div>${t('resultTime')} <b>${fmtTime(G.timer)}</b></div>
      <div>${t('resultOps')} <b>${G.moveHistory.length}</b></div>
      <div>${t('resultMistakes')} <b>${mistakeCount}</b></div>
    `;
    
    // 添加"查看复盘"按钮
    if (mistakeCount > 0) {
      earnEl.innerHTML = `
        <button class="secondary-btn" id="btn-review" style="margin-top:10px;background:var(--accent);color:#fff;border:none;">
          ${t('viewReview')} (${mistakeCount})
        </button>
      `;
      
      // 延迟绑定事件，等待按钮渲染
      setTimeout(() => {
        const reviewBtn = $('#btn-review');
        if (reviewBtn) {
          reviewBtn.onclick = () => {
            modal.classList.add('hidden');
            showReviewScreen();
          };
        }
      }, 100);
    } else {
      earnEl.textContent = t('noMistakes');
    }
  }

  saveState(SAVE);
  refreshCoinDisplays();
  
  // 检查成就
  checkAchievements();
  
  modal.classList.remove('hidden');
}

function computeCoins() {
  if (G.isZen) return 5;
  
  const ratio = G.timer / G.par;
  let speedMult = ratio <= 0.5 ? 3.0 : ratio <= 1 ? 2.0 : ratio <= 1.5 ? 1.5 : ratio <= 2 ? 1.0 : 0.5;
  const itemMult = Math.max(0.3, 1 - 0.15 * G.itemsUsed);
  const fairBonus = G.itemsUsed === 0 ? 1.5 : 1.0;
  let coins = Math.round(G.base * speedMult * itemMult * fairBonus);
  
  if (G.isSurvival) {
    const streakBonus = 1 + (SAVE.survival.currentStreak * 0.1);
    coins = Math.round(coins * streakBonus);
  }
  
  if (G.isSpecial) coins = Math.round(coins * 1.3);
  
  return coins;
}

function triggerVictoryEffect() {
  const effect = SAVE.activeEffect;
  if (effect === 'confetti') createConfetti();
  else if (effect === 'firework') createFirework();
  else if (effect === 'rainbow') createRainbow();
}

function createConfetti() {
  for (let i = 0; i < 50; i++) {
    const confetti = document.createElement('div');
    confetti.style.cssText = `position:fixed;width:10px;height:10px;background:hsl(${Math.random()*360},100%,50%);
      left:${Math.random()*100}%;top:-20px;animation:confettiFall ${Math.random()*2+2}s ease-out forwards;z-index:9999;`;
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }
  
  if (!document.getElementById('confetti-style')) {
    const style = document.createElement('style');
    style.id = 'confetti-style';
    style.textContent = '@keyframes confettiFall{to{top:100vh;transform:rotate(720deg)}}';
    document.head.appendChild(style);
  }
}

// 自定义难度密度更新
function updateDensityTag(){
  const rows = +$('#slider-rows').value;
  const cols = +$('#slider-cols').value;
  let mineSlider = $('#slider-mines');
  const maxMines = Math.max(1, (rows-1)*(cols-1));
  mineSlider.max = maxMines;
  if (+mineSlider.value > maxMines) mineSlider.value = maxMines;
  const mines = +mineSlider.value;

  $('#val-rows').textContent = rows;
  $('#val-cols').textContent = cols;
  $('#val-mines').textContent = mines;

  const info = densityInfo(rows, cols, mines);
  $('#density-tag').textContent = `${t('density')} ${info.pct}% · ${t(info.labelKey)}`;
}

// 设置功能
function setupSettings() {
  // 护眼模式按钮 - 设置初始状态
  $all('.eye-mode-btn').forEach(btn => {
    const currentMode = SAVE.eyeProtection?.intensity || 'off';
    if (btn.dataset.mode === currentMode) {
      btn.classList.add('active');
    }
    
    btn.addEventListener('click', () => {
      $all('.eye-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      SAVE.eyeProtection.intensity = btn.dataset.mode;
      applyEyeProtection();
      saveState(SAVE);
      $('#current-eye-mode').textContent = btn.textContent;
      toast(`${t('eyeModeToast')}${btn.textContent}`);
    });
  });
  
  // 时长提醒按钮 - 设置初始状态
  $all('.remind-btn').forEach(btn => {
    const currentInterval = SAVE.eyeProtection?.reminderInterval || 0;
    const btnTime = btn.dataset.time === 'off' ? 0 : parseInt(btn.dataset.time);
    if (btnTime === currentInterval) {
      btn.classList.add('active');
    }
    
    btn.addEventListener('click', () => {
      $all('.remind-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const time = btn.dataset.time;
      SAVE.eyeProtection.reminderInterval = time === 'off' ? 0 : parseInt(time);
      saveState(SAVE);
      toast(time === 'off' ? t('remindOff') : `${t('remindSetPre')}${time}${t('remindSetPost')}`);
    });
  });
  
  // 震动反馈开关
  const vibToggle = $('#vibration-toggle');
  if (vibToggle) {
    vibToggle.checked = SAVE.settings.vibration;
    vibToggle.addEventListener('change', (e) => {
      SAVE.settings.vibration = e.target.checked;
      saveState(SAVE);
      if (e.target.checked) {
        toast(t('vibrationOn'));
        Vibration.medium();
      } else {
        toast(t('vibrationOff'));
      }
    });
  }
  
  // 粒子特效开关
  const particlesToggle = $('#particles-toggle');
  if (particlesToggle) {
    particlesToggle.checked = SAVE.settings.particles;
    particlesToggle.addEventListener('change', (e) => {
      SAVE.settings.particles = e.target.checked;
      saveState(SAVE);
      if (e.target.checked) {
        toast(t('particlesOn'));
        applyBackground();
      } else {
        toast(t('particlesOff'));
        const bg = $('#particles-bg');
        if (bg) bg.innerHTML = '';
      }
    });
  }

  // 无猜模式开关
  const noguessToggle = $('#noguess-toggle');
  if (noguessToggle) {
    noguessToggle.checked = SAVE.settings.noGuess !== false;
    noguessToggle.addEventListener('change', (e) => {
      SAVE.settings.noGuess = e.target.checked;
      saveState(SAVE);
      toast(e.target.checked ? t('noGuessOn') : t('noGuessOff'));
    });
  }
  
  // 导出数据
  $('#btn-export-data')?.addEventListener('click', () => {
    try {
      const dataStr = JSON.stringify(SAVE, null, 2);
      navigator.clipboard.writeText(dataStr);
      toast(t('dataExported'));
    } catch (e) {
      // 备用方法
      const textarea = document.createElement('textarea');
      textarea.value = JSON.stringify(SAVE);
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      toast(t('dataExported'));
    }
  });
  
  // 导入数据
  $('#btn-import-data')?.addEventListener('click', () => {
    const dataStr = prompt(t('importPrompt'));
    if (!dataStr) return;
    try {
      const data = JSON.parse(dataStr);
      SAVE = data;
      saveState(SAVE);
      location.reload();
    } catch (e) {
      toast(t('dataFormatError'));
    }
  });
  
  // 清空数据
  $('#btn-reset-data')?.addEventListener('click', () => {
    if (!confirm(t('confirmReset'))) return;
    try {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    } catch (e) {
      toast(t('resetFailed'));
    }
  });
}

// 护眼模式应用
function applyEyeProtection() {
  const intensity = SAVE.eyeProtection.intensity;
  
  const filters = {
    off: 'none',
    light: 'sepia(10%) saturate(95%)',
    medium: 'sepia(15%) saturate(90%) contrast(95%)',
    strong: 'sepia(20%) saturate(85%) contrast(90%) brightness(90%)'
  };
  
  document.body.style.filter = filters[intensity] || 'none';
}

function t(key) {
  const lang = SAVE.language || 'zh';
  return TRANSLATIONS[key] ? (TRANSLATIONS[key][lang] != null ? TRANSLATIONS[key][lang] : TRANSLATIONS[key].zh) : key;
}

// 读取数据常量的本地化字段（如 name/nameEn, desc/descEn, style/styleEn）
function L(obj, field) {
  if (!obj) return '';
  const lang = SAVE.language || 'zh';
  if (lang === 'en' && obj[field + 'En'] != null) return obj[field + 'En'];
  return obj[field];
}

// 语言切换
function switchLanguage(lang) {
  SAVE.language = lang;
  saveState(SAVE);
  updateAllTexts();
  toast(lang === 'zh' ? '✓ 已切换到中文' : '✓ Switched to English');
}

// 更新所有界面文字（通用 data-i18n 遍历 + 动态屏幕重渲染）
function updateAllTexts() {
  // 1) 所有带 data-i18n 的静态元素
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (val != null) el.innerHTML = val;
  });
  // 2) 所有带 data-i18n-title 的元素（更新 title 属性）
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.setAttribute('title', t(el.getAttribute('data-i18n-title')));
  });

  // 3) 开发者模式按钮文字
  updateDevModeUI();

  // 4) 自定义难度密度标签
  if ($('#density-tag')) updateDensityTag();

  // 5) 重新渲染当前动态屏幕
  const activeScreen = document.querySelector('.screen.active');
  if (activeScreen) {
    const screenId = activeScreen.id;
    if (screenId === 'screen-shop') renderShop();
    else if (screenId === 'screen-music') renderMusicPlayer();
    else if (screenId === 'screen-achievements') renderAchievements();
    else if (screenId === 'screen-stats') renderStats();
    else if (screenId === 'screen-daily-checkin') renderDailyCheckin();
    else if (screenId === 'screen-rank') renderRank();
  }

  // 6) 玩家卡片与首页记录
  updatePlayerCard();
  renderRecordsBox();
}


// 商城渲染
function shopBtnLabel(equipped, owned, price){
  return equipped ? t('equipped') : (owned ? t('equip') : '🪙 ' + price + ' ' + t('buy'));
}
function shopBtnStyle(equipped, owned){
  return equipped ? 'background:var(--gold);color:#1a1300;'
    : (owned ? 'background:rgba(255,255,255,0.08);color:var(--text-dim);'
             : 'background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0d1a;');
}

function renderShop() {
  refreshCoinDisplays();
  const itemsGrid = $('#shop-items');
  itemsGrid.innerHTML = '';
  Object.keys(ITEMS).forEach(key=>{
    const it = ITEMS[key];
    const owned = SAVE.ownedItems[key] || 0;
    const card = document.createElement('div');
    card.className = 'shop-card glass-card';
    card.style.cssText = 'padding:14px;text-align:center;';
    card.innerHTML = `
      <div style="font-size:28px;margin-bottom:6px;">${it.icon}</div>
      <div style="font-weight:700;font-size:13px;margin-bottom:2px;">${L(it,'name')}</div>
      <div style="font-size:10.5px;color:var(--text-dim);min-height:28px;margin-bottom:8px;">${L(it,'desc')}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">${t('owned')} ${owned}</div>
      <button style="width:100%;padding:8px;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0d1a;">🪙 ${it.price} ${t('buy')}</button>
    `;
    card.querySelector('button').onclick = ()=>{
      if (SAVE.coins < it.price){ toast(t('notEnoughCoins')); return; }
      SAVE.coins -= it.price;
      SAVE.ownedItems[key] = (SAVE.ownedItems[key]||0) + 1;
      SAVE.statistics.totalCoinsSpent += it.price;
      saveState(SAVE);
      Sound.buy();
      renderShop();
      if (G && !G.over) renderItemsBar();
    };
    itemsGrid.appendChild(card);
  });

  const skinsGrid = $('#shop-skins');
  skinsGrid.innerHTML = '';
  Object.keys(SKINS).forEach(key=>{

// 音乐播放器渲染
function renderMusicPlayer() {
  const activeBGM = SAVE.activeBGM || 'calm';
  const ownedBGM = SAVE.ownedBGM || ['calm'];
  
  // 更新当前曲目显示
  if (BGM_TRACKS[activeBGM]) {
    const track = BGM_TRACKS[activeBGM];
    $('#music-cover').textContent = track.icon;
    $('#music-title').textContent = L(track,'name');
    $('#music-artist').textContent = `${L(track,'style')} · ${track.bpm > 0 ? track.bpm + ' BPM' : t('musicAmbient')}`;
  }
  
  // 更新音量显示
  $('#bgm-vol-display').textContent = Math.round(SAVE.musicPlayer.bgmVolume * 100) + '%';
  $('#sfx-vol-display').textContent = Math.round(SAVE.musicPlayer.sfxVolume * 100) + '%';
  $('#master-vol-display').textContent = Math.round(SAVE.musicPlayer.volume * 100) + '%';
  
  // 更新音量滑块
  $('#bgm-volume').value = Math.round(SAVE.musicPlayer.bgmVolume * 100);
  $('#sfx-volume').value = Math.round(SAVE.musicPlayer.sfxVolume * 100);
  $('#master-volume').value = Math.round(SAVE.musicPlayer.volume * 100);
  
  // 渲染曲目列表
  const playlist = $('#music-playlist');
  playlist.innerHTML = '';
  
  Object.keys(BGM_TRACKS).forEach(key => {
    const track = BGM_TRACKS[key];
    const isOwned = ownedBGM.includes(key);
    const isActive = activeBGM === key;
    
    const item = document.createElement('div');
    item.className = 'glass-card';
    item.style.cssText = `
      padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px;
      cursor:${isOwned ? 'pointer' : 'default'};
      ${isActive ? 'border:2px solid var(--accent);background:rgba(91,155,213,0.1);' : ''}
      ${!isOwned ? 'opacity:0.5;' : ''}
    `;
    
    item.innerHTML = `
      <div style="font-size:24px;">${track.icon}</div>
      <div style="flex:1;">
        <div style="font-weight:700;display:flex;align-items:center;gap:8px;">
          ${L(track,'name')}
          ${isActive ? `<span style="font-size:11px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:8px;">${t('musicPlaying')}</span>` : ''}
        </div>
        <div style="font-size:11px;color:var(--text-dim);">${L(track,'style')} ${track.bpm > 0 ? '· ' + track.bpm + ' BPM' : ''}</div>
      </div>
      <div style="font-weight:800;color:var(--gold);">
        ${isOwned ? (isActive ? '♪' : '▶') : '🪙 ' + track.price}
      </div>
    `;
    
    if (isOwned && !isActive) {
      item.onclick = () => {
        SAVE.activeBGM = key;
        saveState(SAVE);
        renderMusicPlayer();
        toast(`${t('musicNowPlaying')}${L(track,'name')}`);
      };
    } else if (!isOwned) {
      item.onclick = () => {
        if (SAVE.coins >= track.price) {
          const msg = (SAVE.language === 'en')
            ? `Buy "${L(track,'name')}" for ${track.price} coins?`
            : `购买《${L(track,'name')}》需要 ${track.price} 金币，确定购买？`;
          if (confirm(msg)) {
            SAVE.coins -= track.price;
            SAVE.ownedBGM.push(key);
            SAVE.statistics.totalCoinsSpent += track.price;
            saveState(SAVE);
            refreshCoinDisplays();
            renderMusicPlayer();
            Sound.buy();
          }
        } else {
          toast(t('musicNotEnough'));
        }
      };
    }
    
    playlist.appendChild(item);
  });
  
  // 绑定音量滑块事件
  $('#bgm-volume').oninput = (e) => {
    SAVE.musicPlayer.bgmVolume = e.target.value / 100;
    $('#bgm-vol-display').textContent = e.target.value + '%';
    saveState(SAVE);
  };
  
  $('#sfx-volume').oninput = (e) => {
    SAVE.musicPlayer.sfxVolume = e.target.value / 100;
    $('#sfx-vol-display').textContent = e.target.value + '%';
    saveState(SAVE);
  };
  
  $('#master-volume').oninput = (e) => {
    SAVE.musicPlayer.volume = e.target.value / 100;
    $('#master-vol-display').textContent = e.target.value + '%';
    saveState(SAVE);
  };
  
  // 全部静音按钮
  $('#btn-mute-all').onclick = () => {
    const isMuted = SAVE.musicPlayer.volume === 0;
    if (isMuted) {
      SAVE.musicPlayer.volume = 1;
      SAVE.musicPlayer.bgmVolume = 0.8;
      SAVE.musicPlayer.sfxVolume = 0.6;
    } else {
      SAVE.musicPlayer.volume = 0;
      SAVE.musicPlayer.bgmVolume = 0;
      SAVE.musicPlayer.sfxVolume = 0;
    }
    saveState(SAVE);
    renderMusicPlayer();
    toast(isMuted ? t('musicUnmuted') : t('musicMuted'));
  };
}

// 段位渲染
function renderRank() {
  const score = calculateRankScore();
  let curKey = 'bronze';
  const keys = Object.keys(RANKS);
  for (const k of keys) { if (score >= RANKS[k].minScore) curKey = k; }
  const cur = RANKS[curKey];

  const iconEl = $('#current-rank-icon');
  if (iconEl) { iconEl.className = 'rank-icon rank-' + curKey; iconEl.textContent = cur.icon; }
  if ($('#current-rank-name')) $('#current-rank-name').textContent = L(cur, 'name');
  if ($('#current-rank-score')) $('#current-rank-score').textContent = t('rankScoreLabel') + Math.round(score);

  // 下一段位进度
  const idx = keys.indexOf(curKey);
  const nextKey = keys[idx + 1];
  const bar = $('#rank-progress-bar');
  const progText = $('#rank-progress-text');
  if (nextKey) {
    const nextMin = RANKS[nextKey].minScore;
    const curMin = cur.minScore;
    const pct = Math.min(100, Math.round(((score - curMin) / (nextMin - curMin)) * 100));
    if (bar) bar.style.width = pct + '%';
    if (progText) progText.textContent = `${Math.round(score)} / ${nextMin}`;
  } else {
    if (bar) bar.style.width = '100%';
    if (progText) progText.textContent = `${Math.round(score)} (MAX)`;
  }

  if ($('#rank-wins')) $('#rank-wins').textContent = SAVE.rank.wins;
  const winrate = SAVE.statistics.totalGames > 0
    ? Math.round((SAVE.statistics.totalWins / SAVE.statistics.totalGames) * 100) : 0;
  if ($('#rank-winrate')) $('#rank-winrate').textContent = winrate + '%';

  // 段位等级列表里的名称（保证语言正确）
  const tierNames = document.querySelectorAll('#screen-rank .rank-tier-name');
  tierNames.forEach(el => {
    const k = el.getAttribute('data-rank');
    if (k && RANKS[k]) el.textContent = L(RANKS[k], 'name');
  });
}

// 检查并解锁成就
function checkAchievements() {
  let newUnlocked = [];
  const unlockedIds = SAVE.achievements.unlocked || [];
  
  Object.keys(ACHIEVEMENTS).forEach(key => {
    if (!unlockedIds.includes(key)) {
      const ach = ACHIEVEMENTS[key];
      if (ach.check(SAVE)) {
        unlockedIds.push(key);
        newUnlocked.push(key);
        
        // 奖励金币
        SAVE.coins += ach.reward;
        
        // 显示通知
        const lang = SAVE.language || 'zh';
        toast(`🎉 ${t('achUnlockToast')}: ${ach.name[lang]} (+${ach.reward} 🪙)`);
        Sound.achievement();
      }
    }
  });
  
  SAVE.achievements.unlocked = unlockedIds;
  if (newUnlocked.length > 0) {
    saveState(SAVE);
    refreshCoinDisplays();
  }
}

// 每日签到渲染
function renderDailyCheckin() {
  const today = todayStr();
  const lastCheckin = SAVE.daily.lastCheckIn;
  const canCheckin = lastCheckin !== today;
  
  $('#consecutive-days').textContent = SAVE.daily.consecutiveDays;
  $('#total-checkin-days').textContent = SAVE.daily.totalCheckIns;
  
  const btn = $('#btn-do-checkin');
  const status = $('#checkin-status');
  
  if (canCheckin) {
    btn.disabled = false;
    btn.textContent = t('checkinNow');
    btn.onclick = () => {
      SAVE.daily.lastCheckIn = today;
      SAVE.daily.consecutiveDays++;
      SAVE.daily.totalCheckIns++;
      
      let reward = 10;
      if (SAVE.daily.consecutiveDays >= 7) reward = 30;
      else if (SAVE.daily.consecutiveDays >= 3) reward = 20;
      
      SAVE.coins += reward;
      saveState(SAVE);
      refreshCoinDisplays();
      toast(SAVE.language === 'en' ? `✅ Check-in successful! Got ${reward} coins` : `✅ 签到成功！获得 ${reward} 金币`);
      Sound.coin();
      renderDailyCheckin();
    };
    status.textContent = '';
  } else {
    btn.disabled = true;
    btn.textContent = t('checkinDone');
    status.textContent = t('checkinComeback');
  }
}

function posText(r, c) {

}

function showReviewScreen() {
  if (!G || !G.mistakes || G.mistakes.length === 0) {
    toast(t('noMistakeRecord'));
    return;
  }
  
  // 创建复盘弹窗
  let reviewModal = $('#review-modal');
  if (!reviewModal) {
    reviewModal = document.createElement('div');
    reviewModal.id = 'review-modal';
    reviewModal.className = 'modal';
    document.body.appendChild(reviewModal);
  }
  
  const mistakes = G.mistakes;
  const fatalMistake = mistakes.find(m => m.type === 'fatal');
  const wrongFlags = mistakes.filter(m => m.type === 'wrong_flag');
  const shouldFlags = mistakes.filter(m => m.type === 'should_flag');
  const missedSafe = mistakes.filter(m => m.type === 'missed_safe');
  
  let mistakesList = '';
  
  // 致命失误
  if (fatalMistake) {
    mistakesList += `
      <div class="mistake-item fatal" style="background:rgba(255,107,107,0.1);border-left:4px solid var(--danger);padding:12px;margin-bottom:12px;border-radius:8px;">

  // 错误标旗
  if (wrongFlags.length > 0) {
    mistakesList += `
      <div class="mistake-item wrong-flag" style="background:rgba(255,152,0,0.1);border-left:4px solid #FF9800;padding:12px;margin-bottom:12px;border-radius:8px;">

        </div>

  // 漏掉的安全格子
  if (missedSafe.length > 0) {

          <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">${posText(mistake.r, mistake.c)}</div>
          <button class="secondary-btn" onclick="highlightMistakeArea(${mistake.r}, ${mistake.c}, 'missed-safe')" style="margin-top:8px;padding:6px 12px;font-size:12px;">${t('highlightArea')}</button>
        </div>
      `;
    });
  }
  
  if (!mistakesList) {
    mistakesList = `<div style="text-align:center;color:var(--text-dim);padding:20px;">${t('noMistakes')}</div>`;
  }
  
  reviewModal.innerHTML = `
    <div class="modal-card glass-modal" style="max-width:500px;max-height:80vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div style="font-size:20px;font-weight:900;">${t('reviewTitle')}</div>
        <button class="icon-btn" id="btn-close-review" style="width:36px;height:36px;">✕</button>
      </div>
      
      <div class="glass-card" style="padding:12px;margin-bottom:16px;text-align:center;">
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:6px;">${t('reviewStats')}</div>
        <div style="display:flex;justify-content:space-around;">
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--accent);">${G.moveHistory.length}</div>
            <div style="font-size:11px;color:var(--text-dim);">${t('reviewTotalOps')}</div>
          </div>
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--danger);">${mistakes.length}</div>
            <div style="font-size:11px;color:var(--text-dim);">${t('reviewMistakeCount')}</div>
          </div>
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--warning);">${fmtTime(G.timer)}</div>
            <div style="font-size:11px;color:var(--text-dim);">${t('reviewTimeUsed')}</div>
          </div>
        </div>
      </div>
      
      <div style="font-weight:800;margin-bottom:12px;font-size:15px;">${t('reviewListTitle')}</div>
      <div id="mistakes-list">
        ${mistakesList}
      </div>
      
      <div class="modal-btns" style="margin-top:16px;">
        <button class="primary-btn" id="btn-back-to-game">${t('reviewBackGame')}</button>
        <button class="secondary-btn" id="btn-close-review2">${t('reviewClose')}</button>
      </div>
    </div>
  `;
  
  reviewModal.classList.remove('hidden');
  
  // 绑定事件
  $('#btn-close-review').onclick = () => {
    reviewModal.classList.add('hidden');
    $('#modal-result').classList.remove('hidden');
  };
  
  $('#btn-close-review2').onclick = () => {
    reviewModal.classList.add('hidden');
    $('#modal-result').classList.remove('hidden');
  };
  
  $('#btn-back-to-game').onclick = () => {
    reviewModal.classList.add('hidden');
    // 游戏界面已经显示，只需关闭弹窗
  };
}

// 高亮单个格子
function highlightCell(r, c, isLastMove = false) {
  if (!G || !G.cellEls || !G.cellEls[r] || !G.cellEls[r][c]) return;
  
  const cell = G.cellEls[r][c];
  
  // 最后一步用特殊的紫红色高亮
  const color = isLastMove ? '#ff0066' : 'var(--danger)';
  const glowColor = isLastMove ? 'rgba(255,0,102,0.6)' : 'rgba(255,107,107,0.6)';
  
  cell.style.boxShadow = `0 0 0 4px ${color}, 0 0 30px ${glowColor}`;
  cell.style.transform = 'scale(1.3)';
  cell.style.zIndex = '100';
  cell.style.animation = 'pulse 1.5s infinite';
  
  // 添加脉冲动画样式
  if (!document.getElementById('pulse-style')) {
    const style = document.createElement('style');
    style.id = 'pulse-style';
    style.textContent = `
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
    `;
    document.head.appendChild(style);
  }
  
  // 滚动到该格子
  cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  setTimeout(() => {
    cell.style.boxShadow = '';
    cell.style.transform = '';
    cell.style.zIndex = '';
    cell.style.animation = '';
  }, 4000);
  
  const moveLabel = isLastMove ? ` (${t('lastMove')})` : '';
  toast(`${posText(r, c)}${moveLabel}`);
}

// 高亮区域
function highlightMistakeArea(r, c, type) {
  if (!G || !G.cellEls) return;
  
  const mainCell = G.cellEls[r][c];
  const color = type === 'should-flag' ? 'var(--warning)' : 'var(--success)';
  
  // 高亮中心格子
  mainCell.style.boxShadow = `0 0 0 3px ${color}, 0 0 20px ${color}`;
  mainCell.style.transform = 'scale(1.15)';
  mainCell.style.zIndex = '100';
  mainCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  // 高亮周围格子
  const nbrs = neighborsOf(r, c, G.rows, G.cols);
  nbrs.forEach(([nr, nc]) => {
    const cell = G.cellEls[nr][nc];
    cell.style.boxShadow = `0 0 0 2px ${color}`;
    cell.style.opacity = '0.8';
  });
  
  setTimeout(() => {
    mainCell.style.boxShadow = '';
    mainCell.style.transform = '';
    mainCell.style.zIndex = '';
    nbrs.forEach(([nr, nc]) => {
      G.cellEls[nr][nc].style.boxShadow = '';
      G.cellEls[nr][nc].style.opacity = '';
    });
  }, 3000);
  
  toast(`${t('reviewAreaToast')}: ${t('row')}${r+1} ${t('col')}${c+1}`);
}
</script>
