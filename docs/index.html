<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>⚔️ 无限世界 RPG</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0e17;font-family:'Segoe UI',system-ui,'PingFang SC','Microsoft YaHei',sans-serif;color:#e6ebf5;user-select:none;}
  #game-canvas{position:fixed;inset:0;width:100%;height:100%;display:block;}
  .hidden{display:none!important;}

  /* 加载 */
  #loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 35%,#1b2b4a,#060912);}
  .lc{text-align:center;}
  .lc .logo{font-size:76px;animation:spin 6s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .lc h1{font-size:32px;margin:14px 0 24px;background:linear-gradient(90deg,#6ee7ff,#4ade80,#f5a623);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800;letter-spacing:2px;}
  .barw{width:300px;height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin:0 auto;}
  .bar{height:100%;width:0;background:linear-gradient(90deg,#6ee7ff,#4ade80);transition:width .3s;border-radius:99px;}
  #ltext{margin-top:14px;font-size:13px;color:#8a94a8;}

  /* 开始/点击进入 */
  #start{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,.6);backdrop-filter:blur(4px);cursor:pointer;}
  .startcard{text-align:center;padding:40px 44px;background:rgba(14,20,34,.85);border:1px solid rgba(110,231,255,.25);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .startcard h1{font-size:30px;margin-bottom:10px;background:linear-gradient(90deg,#6ee7ff,#4ade80);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .startcard p{color:#9aa4b8;font-size:14px;line-height:1.9;margin-bottom:14px;}
  .startcard .big{font-size:18px;color:#f5a623;font-weight:800;margin-top:8px;}
  .startcard b{color:#f5a623;}

  /* HUD */
  #hud{position:fixed;inset:0;z-index:20;pointer-events:none;}
  #crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);transition:transform .08s;}
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.85);box-shadow:0 0 3px #000;}
  #crosshair::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
  #crosshair::after{top:50%;left:0;height:2px;width:100%;transform:translateY(-50%);}
  #stats{position:absolute;top:16px;left:16px;background:rgba(8,12,22,.5);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 14px;min-width:230px;backdrop-filter:blur(6px);}
  .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;}
  .row b{color:#f5a623;font-size:15px;}
  .tag{color:#c3cad8;font-size:12px;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:8px;}
  .barh{position:relative;height:16px;border-radius:8px;background:rgba(0,0,0,.4);overflow:hidden;border:1px solid rgba(255,255,255,.08);margin-bottom:6px;}
  .fill{position:absolute;inset:0;border-radius:8px;transition:width .2s;}
  .hp .fill{background:linear-gradient(90deg,#dc2626,#f87171);}
  .xp{height:9px;} .xp .fill{background:linear-gradient(90deg,#22d3ee,#4ade80);}
  .bt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;text-shadow:0 1px 2px #000;}
  .cs{display:flex;gap:12px;margin-top:8px;font-size:13px;} .cs b{color:#fff;}
  #hint{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-size:13px;color:#c3cad8;background:rgba(8,12,22,.6);padding:8px 16px;border-radius:10px;}
  #labels{position:absolute;inset:0;pointer-events:none;}
  .mlabel{position:absolute;transform:translate(-50%,-100%);text-align:center;width:110px;}
  .mlabel .mn{font-size:11px;font-weight:700;text-shadow:0 1px 3px #000;white-space:nowrap;}
  .mlabel .mn .lv{color:#fbbf24;}
  .mlabel .hpb{height:5px;background:rgba(0,0,0,.6);border-radius:3px;overflow:hidden;margin-top:2px;}
  .mlabel .hpb>div{height:100%;background:linear-gradient(90deg,#dc2626,#f97316);transition:width .15s;}
  #dmg{position:absolute;inset:0;pointer-events:none;}
  .dn{position:absolute;font-weight:800;font-size:20px;text-shadow:0 2px 4px #000;animation:df 1s ease-out forwards;}
  .dn.crit{color:#fbbf24;font-size:28px;} .dn.hurt{color:#ef4444;}
  @keyframes df{0%{opacity:1;transform:translateY(0)}30%{transform:translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateY(-60px)}}
  #toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:40;background:rgba(8,12,22,.95);border:1px solid rgba(245,166,35,.4);border-radius:10px;padding:10px 20px;font-size:14px;}
  #clock{position:absolute;top:16px;right:16px;background:rgba(8,12,22,.5);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 14px;font-size:14px;backdrop-filter:blur(6px);}
</style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud" class="hidden">
    <div id="crosshair"></div>
    <div id="stats">
      <div class="row"><span>Lv.<b id="lvl">1</b></span><span class="tag" id="zone">🌱 草原</span></div>
      <div class="barh hp"><div class="fill" id="hpf"></div><span class="bt" id="hpt">100/100</span></div>
      <div class="barh xp"><div class="fill" id="xpf"></div><span class="bt" id="xpt">0/100</span></div>
      <div class="cs"><span>⚔️ <b id="atk">12</b></span><span>🛡️ <b id="def">0</b></span><span>🪙 <b id="gold">0</b></span></div>
    </div>
    <div id="clock">🕐 08:00</div>
    <div id="labels"></div>
    <div id="dmg"></div>
    <div id="hint">WASD 移动 · 鼠标 转视角 · 左键 攻击 · 空格 跳 · ESC 释放鼠标</div>
  </div>

  <div id="toast" class="hidden"></div>

  <div id="start" class="hidden">
    <div class="startcard">
      <h1>⚔️ 无限世界 RPG</h1>
      <p>真实 3D · 动态光影 · 昼夜循环<br>探索开放世界，击败怪物</p>
      <div class="big">▶ 点击进入世界</div>
    </div>
  </div>

  <div id="loading">
    <div class="lc">
      <div class="logo">🌍</div>
      <h1>无限世界 RPG</h1>
      <div class="barw"><div class="bar" id="lbar"></div></div>
      <div id="ltext">加载引擎...</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./game.js"></script>
</body>
</html>
