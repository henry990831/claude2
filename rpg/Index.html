<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('CSS'); ?>
</head>
<body>
<div id="app">

  <!-- ===================== 加载画面 ===================== -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">🌍</div>
      <h1 class="loading-title">无限世界 RPG</h1>
      <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
      <div class="loading-text" id="loading-text">生成世界...</div>
    </div>
  </div>

  <!-- ===================== 开始菜单 ===================== -->
  <div id="start-menu" class="overlay hidden">
    <div class="menu-card">
      <div class="menu-logo">🌍</div>
      <h1 class="menu-title">无限世界 RPG</h1>
      <p class="menu-subtitle">程序化生成 · 越深入越危险越富饶 · 打怪爆装 · 熔炉锻造</p>
      <div class="menu-stats" id="menu-save-info"></div>
      <button class="menu-btn primary" id="btn-start">▶ 进入世界</button>
      <button class="menu-btn" id="btn-reset-save">🗑 重置存档</button>
      <div class="menu-controls">
        <div class="control-hint"><b>WASD</b> 移动 · <b>鼠标</b> 转视角 · <b>左键</b> 攻击 · <b>空格</b> 跳跃 · <b>Shift</b> 疾跑</div>
        <div class="control-hint"><b>B</b> 背包 · <b>P</b> 人物 · <b>E</b> 交互 · <b>ESC</b> 释放鼠标</div>
      </div>
    </div>
  </div>

  <!-- ===================== 3D 画布 ===================== -->
  <canvas id="game-canvas"></canvas>

  <!-- 怪物悬浮标签(名字/等级/血条) -->
  <div id="monster-labels"></div>
  <!-- 伤害飘字 -->
  <div id="damage-numbers"></div>

  <!-- ===================== HUD ===================== -->
  <div id="hud" class="hidden">
    <div id="crosshair"><span></span><span></span></div>

    <!-- 左上：玩家状态 -->
    <div id="player-stats">
      <div class="stat-row">
        <span class="stat-label">Lv.<b id="hud-level">1</b></span>
        <span class="biome-tag" id="hud-biome">🌱 草原</span>
      </div>
      <div class="bar hp-bar"><div class="bar-fill" id="hud-hp-fill"></div><span class="bar-text" id="hud-hp-text">100/100</span></div>
      <div class="bar xp-bar"><div class="bar-fill" id="hud-xp-fill"></div><span class="bar-text" id="hud-xp-text">0/100</span></div>
      <div class="combat-stats">
        <span title="攻击力">⚔️ <b id="hud-atk">10</b></span>
        <span title="防御力">🛡️ <b id="hud-def">0</b></span>
        <span title="金币">🪙 <b id="hud-gold">0</b></span>
      </div>
      <div class="depth-row">深度 <b id="hud-depth">0</b> m · 危险层 <b id="hud-tier">T1</b></div>
    </div>

    <!-- 右上：小地图 -->
    <div id="minimap-wrap"><canvas id="minimap" width="160" height="160"></canvas></div>

    <!-- 交互提示 -->
    <div id="interact-hint" class="hidden"></div>

    <!-- 底部快捷栏 -->
    <div id="hotbar">
      <div class="hotbar-slot"><span class="slot-key">武器</span><div class="slot-content" id="slot-weapon">—</div></div>
      <div class="hotbar-slot"><span class="slot-key">战甲</span><div class="slot-content" id="slot-armor">—</div></div>
      <div class="hotbar-btn" id="btn-open-bag"><span>🎒</span><small>B</small></div>
      <div class="hotbar-btn" id="btn-open-char"><span>👤</span><small>P</small></div>
    </div>
  </div>

  <!-- ===================== 背包 (B) ===================== -->
  <div id="bag-panel" class="panel-overlay hidden">
    <div class="panel-card">
      <div class="panel-header"><h2>🎒 背包</h2><button class="panel-close" id="btn-bag-close">✕</button></div>
      <div class="bag-cats" id="bag-cats">
        <button class="bag-cat active" data-cat="all">全部</button>
        <button class="bag-cat" data-cat="equip">装备</button>
        <button class="bag-cat" data-cat="material">材料</button>
        <button class="bag-cat" data-cat="consumable">消耗</button>
      </div>
      <div id="bag-grid" class="bag-grid"></div>
      <div class="bag-tip">点击装备穿戴 · 点击药水使用 · 右键丢弃</div>
    </div>
  </div>

  <!-- ===================== 人物面板 (P) ===================== -->
  <div id="char-panel" class="panel-overlay hidden">
    <div class="panel-card wide">
      <div class="panel-header"><h2>👤 人物</h2><button class="panel-close" id="btn-char-close">✕</button></div>
      <div class="char-body">
        <!-- 左：6装备栏 + 角色预览 -->
        <div class="char-left">
          <div class="equip-slots">
            <div class="eq-slot" data-slot="helmet"><div class="eq-icon">⛑️</div><div class="eq-info" id="eq-helmet">头盔</div></div>
            <div class="eq-slot" data-slot="weapon"><div class="eq-icon">⚔️</div><div class="eq-info" id="eq-weapon">武器</div></div>
            <div class="eq-slot" data-slot="armor"><div class="eq-icon">🛡️</div><div class="eq-info" id="eq-armor">战甲</div></div>
            <div class="eq-slot" data-slot="cape"><div class="eq-icon">🧣</div><div class="eq-info" id="eq-cape">披风</div></div>
            <div class="eq-slot" data-slot="boots"><div class="eq-icon">🥾</div><div class="eq-info" id="eq-boots">战靴</div></div>
            <div class="eq-slot" data-slot="ring"><div class="eq-icon">💍</div><div class="eq-info" id="eq-ring">戒指</div></div>
          </div>
          <canvas id="char-preview" width="220" height="260"></canvas>
        </div>
        <!-- 右：完整属性栏 -->
        <div class="char-right">
          <h3>📊 属性总览</h3>
          <div id="stat-list" class="stat-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== 死亡画面 ===================== -->
  <div id="death-screen" class="overlay hidden">
    <div class="death-card">
      <div class="death-icon">💀</div>
      <h1 class="death-title">你被击败了</h1>
      <p class="death-msg" id="death-msg"></p>
      <button class="menu-btn primary" id="btn-respawn">🕊 返回出生点复活</button>
    </div>
  </div>

  <div id="item-tooltip" class="hidden"></div>
  <div id="toast" class="hidden"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<?!= include('JS'); ?>
</body>
</html>
